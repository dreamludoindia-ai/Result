<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - RONAK_LIVE_SHOW</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .admin-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        .payment-requests {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .payment-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .payment-info {
            flex: 1;
        }
        .payment-info strong {
            color: #e65c00;
        }
        .btn-confirm {
            background: #25D366;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-confirm:hover {
            background: #128C7E;
        }
        .result-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .result-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .result-form select, .result-form input, .result-form textarea {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .btn-upload {
            background: #e65c00;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-upload:hover {
            background: #cc5200;
        }
        .results-list {
            margin-top: 20px;
        }
        .result-item {
            background: #f0f0f0;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pending-badge {
            background: #ffc107;
            color: #333;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .confirmed-badge {
            background: #25D366;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .admin-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .admin-nav button {
            padding: 10px 20px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .admin-nav button.active {
            background: #e65c00;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div id="loginSection" class="login-box">
        <h2>🔐 Admin Login</h2>
        <input type="password" id="adminPassword" placeholder="Enter Password">
        <button class="btn-select" onclick="checkLogin()" style="margin-top: 10px;">Login</button>
        <p style="margin-top: 15px; font-size: 12px; color: #888;">Default Password: admin123</p>
    </div>

    <div id="adminPanel" style="display: none;">
        <div class="admin-container">
            <div class="admin-header">
                <h1>🎮 RONAK_LIVE_SHOW Admin Panel</h1>
                <p>Manage Payments & Market Results</p>
                <button onclick="logout()" style="background: red; color: white; border: none; padding: 8px 15px; border-radius: 5px; margin-top: 10px;">Logout</button>
            </div>

            <div class="admin-nav">
                <button class="nav-btn active" onclick="showTab('payments')">💰 Payment Requests</button>
                <button class="nav-btn" onclick="showTab('results')">📊 Upload Results</button>
                <button class="nav-btn" onclick="showTab('history')">📜 Result History</button>
            </div>

            <!-- Payment Requests Tab -->
            <div id="tab-payments" class="tab-content active">
                <div class="payment-requests">
                    <h2>📋 Pending Payment Confirmations</h2>
                    <div id="paymentRequestsList">Loading...</div>
                </div>
            </div>

            <!-- Upload Results Tab -->
            <div id="tab-results" class="tab-content">
                <div class="result-section">
                    <h2>📤 Upload Market Result</h2>
                    <div class="result-form">
                        <select id="resultMarket">
                            <option value="">Select Market</option>
                            <option value="SRIDEVI">SRIDEVI</option>
                            <option value="MILAN DAY">MILAN DAY</option>
                            <option value="KALYAN">KALYAN</option>
                            <option value="SRIDEVI NIGHT">SRIDEVI NIGHT</option>
                            <option value="MILAN NIGHT">MILAN NIGHT</option>
                            <option value="MAIN BAZAR">MAIN BAZAR</option>
                        </select>
                        <input type="text" id="resultDate" placeholder="Date (e.g., 15-04-2026)">
                        <input type="text" id="resultNumber" placeholder="Result Number (e.g., 12345)">
                        <input type="file" id="resultImageUpload" accept="image/*">
                        <textarea id="resultNote" placeholder="Additional Note (optional)"></textarea>
                        <button class="btn-upload" onclick="uploadResult()">📤 Publish Result</button>
                    </div>
                </div>
            </div>

            <!-- History Tab -->
            <div id="tab-history" class="tab-content">
                <div class="result-section">
                    <h2>📜 Published Results History</h2>
                    <div id="resultsHistoryList">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
