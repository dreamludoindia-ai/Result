<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        .stats {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }
        .stats span { font-size: 2rem; color: #22c55e; font-weight: bold; }
        .payment-card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-confirm {
            background: #22c55e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-refresh {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .result-card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .result-card input, .result-card textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
        }
        .preview-img { max-width: 100%; max-height: 150px; border-radius: 8px; margin-top: 10px; }
        .tab-btn {
            background: #1e293b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .tab-btn.active { background: #22c55e; }
        .tab-content { display: none; margin-top: 20px; }
        .tab-content.active { display: block; }
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #22c55e;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>🎮 RONAK_LIVE_SHOW - Admin</h2>
            <button class="btn-refresh" onclick="refreshAll()">🔄 Refresh Now</button>
        </div>

        <div class="stats">
            Pending Payments: <span id="pendingCount">0</span>
        </div>

        <div>
            <button class="tab-btn active" onclick="showTab('payments')">💰 Payments</button>
            <button class="tab-btn" onclick="showTab('results')">📤 Results</button>
        </div>

        <div id="tabPayments" class="tab-content active">
            <div id="paymentsList"></div>
        </div>

        <div id="tabResults" class="tab-content">
            <div id="resultsForm"></div>
        </div>
    </div>

    <script>
        const whatsappNumber = "919113224019";
        const markets = ["SRIDEVI", "MILAN DAY", "KALYAN", "SRIDEVI NIGHT", "MILAN NIGHT", "MAIN BAZAR"];

        function getPayments() {
            return JSON.parse(localStorage.getItem('payments_list') || '[]');
        }

        function savePayments(payments) {
            localStorage.setItem('payments_list', JSON.stringify(payments));
        }

        function getResults() {
            return JSON.parse(localStorage.getItem('results_list') || '{}');
        }

        function saveResults(results) {
            localStorage.setItem('results_list', JSON.stringify(results));
        }

        function refreshAll() {
            loadPayments();
            loadResultsForm();
            showAlert('✅ Refreshed!');
        }

        function loadPayments() {
            const payments = getPayments();
            const container = document.getElementById('paymentsList');
            document.getElementById('pendingCount').innerHTML = payments.length;

            if (payments.length === 0) {
                container.innerHTML = '<p style="color: #94a3b8; text-align: center; padding: 40px;">📭 No pending payments</p>';
                return;
            }

            let html = '';
            payments.forEach((req, index) => {
                html += `
                    <div class="payment-card">
                        <div>
                            <strong style="color: #22c55e;">💰 ${req.market}</strong><br>
                            🆔 ${req.id}<br>
                            ⏰ ${req.time}
                        </div>
                        <button class="btn-confirm" onclick="confirmPayment(${index})">✅ Confirm & Send Result</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function confirmPayment(index) {
            const payments = getPayments();
            const request = payments[index];
            const results = getResults();
            const result = results[request.market];

            if (!result || !result.imageUrl) {
                showAlert(`❌ Upload result for ${request.market} first!`, 'error');
                return;
            }

            // Send result to user
            const msg = `✅✅ PAYMENT CONFIRMED! ✅✅%0A%0AMarket: ${request.market}%0AAmount: ₹999%0AID: ${request.id}%0A%0A🎯 YOUR RESULT:%0A${result.imageUrl}%0A%0A${result.note}`;
            window.open(`https://wa.me/${whatsappNumber}?text=${msg}`, '_blank');

            // Remove from pending
            payments.splice(index, 1);
            savePayments(payments);
            loadPayments();
            showAlert(`✅ Payment confirmed! Result sent.`);
        }

        function loadResultsForm() {
            const results = getResults();
            const container = document.getElementById('resultsForm');
            let html = '';

            markets.forEach(market => {
                const current = results[market] || {};
                html += `
                    <div class="result-card">
                        <h4 style="color: #22c55e;">📊 ${market}</h4>
                        <input type="text" id="img_${market.replace(/ /g, '_')}" 
                               value="${current.imageUrl || ''}" 
                               placeholder="Result Image URL (direct link)">
                        <input type="text" id="num_${market.replace(/ /g, '_')}" 
                               value="${current.number || ''}" 
                               placeholder="Result Number">
                        ${current.imageUrl ? `<img src="${current.imageUrl}" class="preview-img">` : ''}
                        <button class="btn-confirm" onclick="saveResult('${market}')">💾 Save Result</button>
                    </div>
                `;
            });

            html += `<div style="background: #1e293b; padding: 15px; border-radius: 12px; margin-top: 15px;">
                        <strong style="color: white;">📌 How to get image URL:</strong><br>
                        <span style="color: #94a3b8;">1. Upload image to imgur.com or postimages.org<br>2. Copy direct image link (ends with .jpg or .png)<br>3. Paste above and click Save</span>
                    </div>`;
            container.innerHTML = html;
        }

        function saveResult(market) {
            const marketKey = market.replace(/ /g, '_');
            const imageUrl = document.getElementById(`img_${marketKey}`).value;
            const number = document.getElementById(`num_${marketKey}`).value;

            if (!imageUrl) {
                showAlert('❌ Please enter image URL!', 'error');
                return;
            }

            const results = getResults();
            results[market] = {
                imageUrl: imageUrl,
                number: number || 'N/A',
                note: `🎉 ${market} Result: ${number || 'Check image'}`
            };
            saveResults(results);
            showAlert(`✅ Result for ${market} saved!`);
            loadResultsForm();
        }

        function showAlert(msg, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert';
            alertDiv.style.background = type === 'error' ? '#ef4444' : '#22c55e';
            alertDiv.innerHTML = msg;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
            event.target.classList.add('active');
            if (tab === 'payments') loadPayments();
            if (tab === 'results') loadResultsForm();
        }

        // Auto refresh every 3 seconds
        setInterval(() => {
            loadPayments();
        }, 3000);

        // Initial load
        loadPayments();
        loadResultsForm();
    </script>
</body>
</html>
