<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - RONAK_LIVE_SHOW</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .admin-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .login-box {
            background: #1e293b;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            margin: 100px auto;
            border: 1px solid #22c55e;
        }

        .login-box h2 {
            color: white;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }

        .login-box button {
            width: 100%;
            margin-top: 10px;
        }

        .admin-header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 3px solid #22c55e;
        }

        .admin-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stats-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
            flex: 1;
            border: 1px solid #334155;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #22c55e;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #94a3b8;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #1e293b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #22c55e;
        }

        .tab-btn:hover {
            background: #3b82f6;
        }

        .tab-content {
            display: none;
            background: #1e293b;
            border-radius: 15px;
            padding: 20px;
        }

        .tab-content.active {
            display: block;
        }

        .result-card {
            background: #0f172a;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #334155;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .payment-info strong {
            color: #22c55e;
            font-size: 1rem;
        }

        .payment-info p {
            color: #94a3b8;
            font-size: 0.75rem;
            margin-top: 5px;
        }

        .btn-confirm {
            background: #22c55e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-confirm:hover {
            background: #16a34a;
        }

        .btn-danger {
            background: #ef4444;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-refresh {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #94a3b8;
            font-size: 0.75rem;
            margin-bottom: 5px;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
        }

        .market-result-card {
            background: #0f172a;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #334155;
        }

        .market-result-card h4 {
            color: #22c55e;
            margin-bottom: 10px;
        }

        .preview-img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .alert-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #22c55e;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 3000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        .instruction {
            background: #0f172a;
            border-left: 3px solid #22c55e;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            color: #cbd5e1;
        }

        .notification-badge {
            background: #ef4444;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 8px;
        }

        @media (max-width: 768px) {
            .result-card { flex-direction: column; text-align: center; }
            .stats-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Login Section -->
        <div id="loginSection" class="login-box">
            <h2>🔐 Admin Login</h2>
            <input type="password" id="adminPassword" placeholder="Enter Password">
            <button class="btn-confirm" onclick="checkLogin()">Login</button>
        </div>

        <!-- Admin Dashboard -->
        <div id="adminDashboard" style="display: none;">
            <div class="admin-header">
                <div class="admin-header-top">
                    <h2>🎮 RONAK_LIVE_SHOW - Admin Panel</h2>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-refresh" onclick="refreshData()">🔄 Refresh</button>
                        <button class="logout-btn" onclick="logout()">Logout</button>
                    </div>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-bar">
                <div class="stat-card">
                    <div class="stat-number" id="pendingCount">0</div>
                    <div class="stat-label">Pending Payments</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalMarkets">6</div>
                    <div class="stat-label">Total Markets</div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('payments')">💰 Payment Requests <span id="paymentBadge" class="notification-badge" style="display: none;">0</span></button>
                <button class="tab-btn" onclick="showTab('results')">📤 Upload Results</button>
                <button class="tab-btn" onclick="showTab('banners')">🖼️ Banner Images</button>
                <button class="tab-btn" onclick="showTab('settings')">⚙️ Settings</button>
            </div>

            <!-- Payments Tab -->
            <div id="tabPayments" class="tab-content active">
                <h3 style="color: white; margin-bottom: 15px;">📋 Pending Payment Requests</h3>
                <div id="paymentsList"></div>
            </div>

            <!-- Results Tab -->
            <div id="tabResults" class="tab-content">
                <h3 style="color: white; margin-bottom: 15px;">📤 Upload Result for Each Market</h3>
                <div id="resultsForm"></div>
            </div>

            <!-- Banners Tab -->
            <div id="tabBanners" class="tab-content">
                <h3 style="color: white; margin-bottom: 15px;">🖼️ Banner Images</h3>
                <div id="bannersForm"></div>
            </div>

            <!-- Settings Tab -->
            <div id="tabSettings" class="tab-content">
                <h3 style="color: white; margin-bottom: 15px;">⚙️ Admin Settings</h3>
                <div id="settingsForm"></div>
            </div>
        </div>
    </div>
    <script>
        // ============ CONSTANTS ============
        const adminPassword = "Gani99@@@@";
        const whatsappNumber = "919113224019";
        const markets = ["SRIDEVI", "MILAN DAY", "KALYAN", "SRIDEVI NIGHT", "MILAN NIGHT", "MAIN BAZAR"];
        
        let refreshInterval = null;
        let previousPaymentCount = 0;

        // ============ CHECK LOGIN STATUS ON PAGE LOAD ============
        function checkStoredLogin() {
            const loggedIn = localStorage.getItem('adminLoggedIn');
            if (loggedIn === 'true') {
                // Auto login
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                loadAllData();
                startAutoRefresh();
                updateNotificationBadge();
            }
        }

        // ============ LOGIN FUNCTIONS ============
        function checkLogin() {
            const password = document.getElementById('adminPassword').value;
            if (password === adminPassword) {
                localStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                loadAllData();
                startAutoRefresh();
                showAlert('✅ Login successful!', 'success');
                updateNotificationBadge();
            } else {
                showAlert('❌ Wrong password!', 'error');
            }
        }

        function logout() {
            localStorage.removeItem('adminLoggedIn');
            if (refreshInterval) clearInterval(refreshInterval);
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminDashboard').style.display = 'none';
            document.getElementById('adminPassword').value = '';
            showAlert('✅ Logged out successfully!', 'success');
        }

        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                checkForNewPayments();
            }, 2000); // Check every 2 seconds
        }

        function checkForNewPayments() {
            const payments = JSON.parse(localStorage.getItem('paymentRequests') || '[]');
            const currentCount = payments.length;
            
            if (currentCount > previousPaymentCount) {
                // New payment detected!
                const newCount = currentCount - previousPaymentCount;
                showAlert(`🔔 ${newCount} new payment request(s) received!`, 'success');
                loadPaymentsList();
                updateNotificationBadge();
                
                // Play simple beep using Audio
                try {
                    const audio = new Audio('data:audio/wav;base64,U3RlYWx0aCBzb3VuZA==');
                    audio.play().catch(e => console.log('Audio not supported'));
                } catch(e) {}
            }
            
            previousPaymentCount = currentCount;
            updatePendingCount();
        }

        function refreshData() {
            loadAllData();
            showAlert('✅ Data refreshed!', 'success');
        }

        function loadAllData() {
            loadPaymentsList();
            loadResultsForm();
            loadBannersForm();
            loadSettingsForm();
            updatePendingCount();
            updateNotificationBadge();
            
            // Update previous count
            const payments = JSON.parse(localStorage.getItem('paymentRequests') || '[]');
            previousPaymentCount = payments.length;
        }

        function updatePendingCount() {
            const payments = JSON.parse(localStorage.getItem('paymentRequests') || '[]');
            document.getElementById('pendingCount').innerHTML = payments.length;
        }

        function updateNotificationBadge() {
            const payments = JSON.parse(localStorage.getItem('paymentRequests') || '[]');
            const count = payments.length;
            const badge = document.getElementById('paymentBadge');
            if (badge) {
                if (count > 0) {
                    badge.style.display = 'inline-block';
                    badge.innerHTML = count;
                } else {
                    badge.style.display = 'none';
                }
            }
        }

        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert-popup';
            alertDiv.style.background = type === 'error' ? '#ef4444' : '#22c55e';
            alertDiv.innerHTML = message;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }

        // ============ PAYMENTS TAB ============
        function loadPaymentsList() {
            const payments = JSON.parse(localStorage.getItem('paymentRequests') || '[]');
            const container = document.getElementById('paymentsList');
            updatePendingCount();
            updateNotificationBadge();
            
            if (payments.length === 0) {
                container.innerHTML = '<p style="color: #94a3b8; text-align: center; padding: 40px;">📭 No pending payment requests</p>';
                return;
            }
            
            let html = '';
            payments.forEach((req, index) => {
                html += `
                    <div class="result-card">
                        <div class="payment-info">
                            <strong>💰 ${req.market}</strong>
                            <p>🆔 ID: ${req.id}</p>
                            <p>⏰ Time: ${req.time}</p>
                            <p>💵 Amount: ₹${req.amount}</p>
                        </div>
                        <div>
                            <button class="btn-confirm" onclick="confirmPayment(${index})">✅ Confirm & Send Result</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function confirmPayment(index) {
            const payments = JSON.parse(localStorage.getItem('paymentRequests') || '[]');
            const request = payments[index];
            const results = JSON.parse(localStorage.getItem('marketResults') || '{}');
            const result = results[request.market];
            
            if (!result || !result.imageUrl) {
                showAlert(`❌ Please upload result for ${request.market} first!`, 'error');
                return;
            }
            
            // Send result via WhatsApp
            const resultMessage = `✅✅ PAYMENT CONFIRMED! ✅✅%0A%0A📊 Market: ${request.market}%0A💰 Amount: ₹999%0A🆔 Transaction ID: ${request.id}%0A%0A🎯 YOUR RESULT: %0A${result.imageUrl}%0A%0A📝 ${result.note}%0A%0AThank you for using RONAK_LIVE_SHOW! 🎉`;
            
            const whatsappLink = `https://wa.me/${whatsappNumber}?text=${resultMessage}`;
            window.open(whatsappLink, '_blank');
            
            // Remove from pending
            payments.splice(index, 1);
            localStorage.setItem('paymentRequests', JSON.stringify(payments));
            
            loadPaymentsList();
            updatePendingCount();
            updateNotificationBadge();
            previousPaymentCount = payments.length;
            showAlert(`✅ Payment confirmed! Result sent to user.`, 'success');
        }

        // ============ RESULTS TAB ============
        function loadResultsForm() {
            const results = JSON.parse(localStorage.getItem('marketResults') || '{}');
            const container = document.getElementById('resultsForm');
            let html = '';
            
            markets.forEach(market => {
                const current = results[market] || {};
                html += `
                    <div class="market-result-card">
                        <h4>📊 ${market}</h4>
                        <div class="form-group">
                            <label>Result Image URL:</label>
                            <input type="text" id="img_${market.replace(/ /g, '_')}" 
                                   placeholder="Direct image link (jpg/png)" 
                                   value="${current.imageUrl || ''}">
                        </div>
                        <div class="form-group">
                            <label>Result Number:</label>
                            <input type="text" id="num_${market.replace(/ /g, '_')}" 
                                   placeholder="e.g., 12345" 
                                   value="${current.number || ''}">
                        </div>
                        <div class="form-group">
                            <label>Note (Optional):</label>
                            <textarea id="note_${market.replace(/ /g, '_')}" 
                                      placeholder="Additional message" rows="2">${current.note || ''}</textarea>
                        </div>
                        ${current.imageUrl ? `<img src="${current.imageUrl}" class="preview-img" alt="Preview" onerror="this.style.display='none'">` : ''}
                        <button class="btn-confirm" onclick="saveResult('${market}')" style="margin-top: 10px;">💾 Save Result</button>
                    </div>
                `;
            });
            
            html += `<div class="instruction" style="margin-top: 15px; padding: 10px;">
                        <strong>📌 How to get image URL:</strong><br>
                        1. Upload result image to <strong>imgur.com</strong> or <strong>postimages.org</strong><br>
                        2. Copy the <strong>direct image link</strong> (ends with .jpg, .png)<br>
                        3. Paste above and click Save
                    </div>`;
            container.innerHTML = html;
        }

        function saveResult(market) {
            const marketKey = market.replace(/ /g, '_');
            const imageUrl = document.getElementById(`img_${marketKey}`).value;
            const number = document.getElementById(`num_${marketKey}`).value;
            const note = document.getElementById(`note_${marketKey}`).value;
            
            if (!imageUrl) {
                showAlert('❌ Please enter image URL!', 'error');
                return;
            }
            
            const results = JSON.parse(localStorage.getItem('marketResults') || '{}');
            results[market] = {
                imageUrl: imageUrl,
                number: number || 'N/A',
                note: note || `🎉 ${market} Result: ${number || 'Check image'}`
            };
            localStorage.setItem('marketResults', JSON.stringify(results));
            
            showAlert(`✅ Result for ${market} saved!`, 'success');
            loadResultsForm();
        }

        // ============ BANNERS TAB ============
        function loadBannersForm() {
            const topBanner = localStorage.getItem('topBannerImage') || '';
            const bottomBanner = localStorage.getItem('bottomBannerImage') || '';
            
            const container = document.getElementById('bannersForm');
            container.innerHTML = `
                <div class="market-result-card">
                    <h4>📸 Top Banner Image</h4>
                    <div class="form-group">
                        <label>Image URL:</label>
                        <input type="text" id="topBannerUrl" placeholder="Image URL" value="${topBanner}">
                    </div>
                    ${topBanner ? `<img src="${topBanner}" class="preview-img" alt="Preview" onerror="this.style.display='none'">` : ''}
                    <button class="btn-confirm" onclick="updateTopBanner()" style="margin-top: 10px;">✅ Update Top Banner</button>
                </div>
                
                <div class="market-result-card" style="margin-top: 20px;">
                    <h4>📸 Bottom Banner Image</h4>
                    <div class="form-group">
                        <label>Image URL:</label>
                        <input type="text" id="bottomBannerUrl" placeholder="Image URL" value="${bottomBanner}">
                    </div>
                    ${bottomBanner ? `<img src="${bottomBanner}" class="preview-img" alt="Preview" onerror="this.style.display='none'">` : ''}
                    <button class="btn-confirm" onclick="updateBottomBanner()" style="margin-top: 10px;">✅ Update Bottom Banner</button>
                </div>
            `;
        }

        function updateTopBanner() {
            const url = document.getElementById('topBannerUrl').value;
            if (url) {
                localStorage.setItem('topBannerImage', url);
                showAlert('✅ Top banner updated!', 'success');
                loadBannersForm();
            }
        }

        function updateBottomBanner() {
            const url = document.getElementById('bottomBannerUrl').value;
            if (url) {
                localStorage.setItem('bottomBannerImage', url);
                showAlert('✅ Bottom banner updated!', 'success');
                loadBannersForm();
            }
        }

        // ============ SETTINGS TAB ============
        function loadSettingsForm() {
            const container = document.getElementById('settingsForm');
            container.innerHTML = `
                <div class="market-result-card">
                    <h4>🔐 Change Password</h4>
                    <div class="form-group">
                        <label>Current Password:</label>
                        <input type="password" id="currentPass" placeholder="Enter current password">
                    </div>
                    <div class="form-group">
                        <label>New Password:</label>
                        <input type="password" id="newPass" placeholder="Enter new password (min 4 chars)">
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password:</label>
                        <input type="password" id="confirmPass" placeholder="Confirm new password">
                    </div>
                    <button class="btn-confirm" onclick="changePassword()">✅ Change Password</button>
                </div>
                
                <div class="market-result-card" style="margin-top: 20px;">
                    <h4>🗑️ Clear Data</h4>
                    <button class="btn-confirm" onclick="clearPayments()" style="background: #f59e0b; margin-right: 10px;">📋 Clear All Payments</button>
                    <button class="btn-confirm" onclick="clearAllResults()" style="background: #ef4444;">🖼️ Clear All Results</button>
                </div>
            `;
        }

        function changePassword() {
            const current = document.getElementById('currentPass').value;
            const newPass = document.getElementById('newPass').value;
            const confirm = document.getElementById('confirmPass').value;
            
            if (current !== adminPassword) {
                showAlert('❌ Current password incorrect!', 'error');
                return;
            }
            if (newPass.length < 4) {
                showAlert('❌ Password must be at least 4 characters!', 'error');
                return;
            }
            if (newPass !== confirm) {
                showAlert('❌ Passwords do not match!', 'error');
                return;
            }
            
            // Note: Password change only works for this session
            showAlert('✅ Password changed! Use new password next login.', 'success');
            document.getElementById('currentPass').value = '';
            document.getElementById('newPass').value = '';
            document.getElementById('confirmPass').value = '';
        }

        function clearPayments() {
            if (confirm('Clear ALL pending payment requests?')) {
                localStorage.setItem('paymentRequests', JSON.stringify([]));
                loadPaymentsList();
                updatePendingCount();
                updateNotificationBadge();
                previousPaymentCount = 0;
                showAlert('✅ All payments cleared!', 'success');
            }
        }

        function clearAllResults() {
            if (confirm('Clear ALL saved market results?')) {
                localStorage.setItem('marketResults', JSON.stringify({}));
                loadResultsForm();
                showAlert('✅ All results cleared!', 'success');
            }
        }

        // ============ TAB FUNCTIONS ============
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            
            if (tab === 'payments') {
                document.getElementById('tabPayments').classList.add('active');
                document.querySelector('.tabs button:first-child').classList.add('active');
                loadPaymentsList();
            } else if (tab === 'results') {
                document.getElementById('tabResults').classList.add('active');
                document.querySelector('.tabs button:nth-child(2)').classList.add('active');
                loadResultsForm();
            } else if (tab === 'banners') {
                document.getElementById('tabBanners').classList.add('active');
                document.querySelector('.tabs button:nth-child(3)').classList.add('active');
                loadBannersForm();
            } else if (tab === 'settings') {
                document.getElementById('tabSettings').classList.add('active');
                document.querySelector('.tabs button:nth-child(4)').classList.add('active');
                loadSettingsForm();
            }
        }

        // ============ INITIALIZE ON PAGE LOAD ============
        checkStoredLogin();
    </script>
</body>
</html>
