<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>Kalyan · digital panel</title>
  <!-- Font & base style -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0e14;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      padding: 1rem;
    }

    /* main card – digital / led style */
    .panel {
      max-width: 820px;
      width: 100%;
      background: #141a24;
      background-image: radial-gradient(circle at 20% 30%, #1f2a3a 0%, #0d121b 90%);
      border-radius: 3rem 3rem 2.5rem 2.5rem;
      padding: 2.2rem 2.2rem 2.8rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,215,0,0.15);
      border: 1px solid #f0b83a30;
      transition: all 0.2s;
    }

    /* header row: RS + weekly + fees */
    .top-badge {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0c111b;
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      margin-bottom: 1.8rem;
      border: 1px solid #f5c54240;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.6), 0 0 10px #f0b83a10;
    }

    .top-badge .rs {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: 2px;
      color: #f5d77b;
      text-shadow: 0 0 8px #f5b83a, 0 0 20px #f5b83a30;
    }

    .top-badge .weekly {
      font-family: 'Orbitron', monospace;
      font-weight: 600;
      font-size: 1.2rem;
      letter-spacing: 2px;
      color: #b7cbee;
      background: #1f2a3e;
      padding: 0.2rem 1.2rem;
      border-radius: 40px;
      border: 1px solid #f5c54260;
      text-transform: uppercase;
    }

    .top-badge .fees {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: 3px;
      color: #f5d77b;
      text-shadow: 0 0 8px #f0b83a, 0 0 20px #f0b83a30;
    }

    /* main number / code row */
    .code-block {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0b0f18;
      padding: 0.8rem 1.8rem;
      border-radius: 80px;
      margin-bottom: 2rem;
      border: 1px solid #f5c54250;
      box-shadow: inset 0 4px 12px #00000080, 0 0 15px #f5b83a15;
    }

    .code-block .big-code {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 2.6rem;
      letter-spacing: 6px;
      color: #f5e7c8;
      text-shadow: 0 0 6px #f5b83a, 0 0 20px #f5b83a40;
    }

    .code-block .label-kalyan {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: 4px;
      background: linear-gradient(145deg, #f5d77b, #dba42b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 20px #f5b83a60;
    }

    /* sub text : एस आपन दूर क्लोज - जोडी की पट्टी अवश्य करें */
    .hint-text {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.5px;
      color: #d0dff0;
      background: #1e2738;
      padding: 0.6rem 1.5rem;
      border-radius: 60px;
      display: inline-block;
      margin-bottom: 1.8rem;
      border-left: 4px solid #f5b83a;
      box-shadow: inset 0 2px 4px #00000060;
      backdrop-filter: blur(2px);
      width: 100%;
      text-align: center;
    }

    /* number grid – 3 columns */
    .number-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-bottom: 2rem;
    }

    .number-grid .num-item {
      background: #0d131f;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 2.2rem;
      text-align: center;
      padding: 0.6rem 0.2rem;
      border-radius: 20px;
      color: #f5e7c8;
      border: 1px solid #f5c54240;
      box-shadow: inset 0 2px 8px #00000080, 0 0 8px #f5b83a20;
      letter-spacing: 2px;
      transition: 0.1s ease;
      background: #111b2b;
    }

    /* second row : three numbers (355 580 350 ...) */
    .grid-row-2 {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .grid-row-2 .num-sm {
      background: #0a101c;
      font-family: 'Orbitron', monospace;
      font-weight: 600;
      font-size: 1.3rem;
      text-align: center;
      padding: 0.5rem 0.2rem;
      border-radius: 30px;
      color: #d4e2ff;
      border: 1px solid #f5b83a30;
      box-shadow: inset 0 2px 6px #000000;
      letter-spacing: 1px;
    }

    /* bottom row: three 4-digit numbers */
    .grid-row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-bottom: 2.2rem;
    }

    .grid-row-3 .num-lg {
      background: #0a101c;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 2.2rem;
      text-align: center;
      padding: 0.7rem 0.2rem;
      border-radius: 30px;
      color: #f5e7c8;
      border: 1px solid #f5b83a40;
      box-shadow: inset 0 2px 8px #000000, 0 0 12px #f5b83a20;
      letter-spacing: 3px;
    }

    /* footer line: पो. राज सर + number + website */
    .footer-line {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      background: #0c111f;
      padding: 0.8rem 1.8rem;
      border-radius: 60px;
      border: 1px solid #f5b83a30;
      margin-top: 0.8rem;
      box-shadow: inset 0 2px 8px #00000080;
    }

    .footer-line .raj {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: #e8dcc8;
      letter-spacing: 1px;
    }
    .footer-line .raj span {
      color: #f5c542;
      font-weight: 700;
    }
    .footer-line .phone {
      font-family: 'Orbitron', monospace;
      font-weight: 600;
      font-size: 1.2rem;
      color: #f5d77b;
      letter-spacing: 2px;
      text-shadow: 0 0 8px #f0b83a60;
    }
    .footer-line .web {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      color: #b0c7e8;
      letter-spacing: 0.5px;
      border-bottom: 1px dashed #f5b83a60;
    }

    /* ---------- ADMIN PANEL ---------- */
    .admin-toggle {
      margin-top: 2rem;
      text-align: right;
    }
    .admin-toggle button {
      background: #1f2a3e;
      border: 1px solid #f5b83a40;
      color: #b7cbee;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 0.4rem 1.4rem;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 1px;
      backdrop-filter: blur(4px);
      background: #0d1628b0;
    }
    .admin-toggle button:hover {
      background: #f5b83a20;
      color: #f5d77b;
      border-color: #f5b83a;
      box-shadow: 0 0 20px #f5b83a20;
    }

    .admin-panel {
      margin-top: 1.2rem;
      background: #0f172ad0;
      backdrop-filter: blur(8px);
      padding: 1.5rem 1.8rem;
      border-radius: 40px;
      border: 1px solid #f5c54230;
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem 1.5rem;
      box-shadow: inset 0 0 20px #00000080;
    }
    .admin-panel.open {
      display: grid;
    }
    .admin-panel label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #b7cbee;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .admin-panel label input {
      background: #0b101e;
      border: 1px solid #f5b83a50;
      padding: 0.5rem 0.8rem;
      border-radius: 30px;
      color: #f5e7c8;
      font-family: 'Orbitron', monospace;
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
    }
    .admin-panel label input:focus {
      border-color: #f5b83a;
      box-shadow: 0 0 20px #f5b83a20;
    }
    .admin-panel .apply-btn {
      grid-column: 1 / -1;
      background: #f5b83a30;
      border: 1px solid #f5b83a;
      color: #f5e7c8;
      font-weight: 700;
      padding: 0.7rem;
      border-radius: 60px;
      font-size: 1rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.4rem;
      backdrop-filter: blur(4px);
    }
    .admin-panel .apply-btn:hover {
      background: #f5b83a60;
      box-shadow: 0 0 30px #f5b83a40;
    }

    /* digital glow */
    .glow-text {
      text-shadow: 0 0 6px #f5b83a, 0 0 20px #f5b83a40;
    }

    @media (max-width: 600px) {
      .panel { padding: 1.5rem; }
      .top-badge { flex-wrap: wrap; justify-content: center; gap: 0.4rem; }
      .code-block { flex-wrap: wrap; justify-content: center; gap: 0.5rem; }
      .number-grid .num-item { font-size: 1.8rem; }
      .grid-row-2 .num-sm { font-size: 1rem; }
      .grid-row-3 .num-lg { font-size: 1.6rem; }
      .footer-line { flex-direction: column; gap: 0.4rem; align-items: center; }
      .admin-panel { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="panel" id="mainPanel">

  <!-- top: RS / WEEKLY / FEES -->
  <div class="top-badge">
    <span class="rs" id="rsDisplay">RS.</span>
    <span class="weekly" id="weeklyDisplay">WEEKLY</span>
    <span class="fees" id="feesDisplay">3000/-</span>
  </div>

  <!-- code + KALYAN -->
  <div class="code-block">
    <span class="big-code" id="codeDisplay">93014 01044</span>
    <span class="label-kalyan" id="kalyanDisplay">KALYAN</span>
  </div>

  <!-- hint text -->
  <div class="hint-text" id="hintDisplay">(एस आपन दूर क्लोज - जोडी की पट्टी अवश्य करें )</div>

  <!-- row 1: 3 8 1 -->
  <div class="number-grid" id="row1Grid">
    <div class="num-item" id="r1c1">3</div>
    <div class="num-item" id="r1c2">8</div>
    <div class="num-item" id="r1c3">1</div>
  </div>

  <!-- row 2: six numbers -->
  <div class="grid-row-2" id="row2Grid">
    <div class="num-sm" id="r2c1">355</div>
    <div class="num-sm" id="r2c2">580</div>
    <div class="num-sm" id="r2c3">350</div>
    <div class="num-sm" id="r2c4">558</div>
    <div class="num-sm" id="r2c5">227</div>
    <div class="num-sm" id="r2c6">560</div>
  </div>

  <!-- row 3: three 4-digit numbers -->
  <div class="grid-row-3" id="row3Grid">
    <div class="num-lg" id="r3c1">3833</div>
    <div class="num-lg" id="r3c2">8388</div>
    <div class="num-lg" id="r3c3">1116</div>
  </div>

  <!-- footer -->
  <div class="footer-line">
    <span class="raj">पो. <span>राज सर</span> - <span id="footerPhone">9301401044</span></span>
    <span class="web" id="footerWeb">WWW.KALYANSUBHANK.COM</span>
  </div>

  <!-- admin toggle -->
  <div class="admin-toggle">
    <button id="adminToggleBtn">⚙️ ADMIN</button>
  </div>

  <!-- admin panel (no password) -->
  <div class="admin-panel" id="adminPanel">
    <label>RS. <input type="text" id="adminRs" value="RS."></label>
    <label>WEEKLY <input type="text" id="adminWeekly" value="WEEKLY"></label>
    <label>FEES <input type="text" id="adminFees" value="3000/-"></label>
    <label>CODE <input type="text" id="adminCode" value="93014 01044"></label>
    <label>KALYAN <input type="text" id="adminKalyan" value="KALYAN"></label>
    <label>HINT <input type="text" id="adminHint" value="(एस आपन दूर क्लोज - जोडी की पट्टी अवश्य करें )"></label>
    <label>R1C1 <input type="text" id="adminR1c1" value="3"></label>
    <label>R1C2 <input type="text" id="adminR1c2" value="8"></label>
    <label>R1C3 <input type="text" id="adminR1c3" value="1"></label>
    <label>R2 (6 nums) <input type="text" id="adminR2" value="355,580,350,558,227,560"></label>
    <label>R3 (3 nums) <input type="text" id="adminR3" value="3833,8388,1116"></label>
    <label>FOOTER PHONE <input type="text" id="adminPhone" value="9301401044"></label>
    <label>WEBSITE <input type="text" id="adminWeb" value="WWW.KALYANSUBHANK.COM"></label>
    <button class="apply-btn" id="applyAdminBtn">⟳ APPLY CHANGES</button>
  </div>
</div>

<script>
  (function() {
    const panel = document.getElementById('adminPanel');
    const toggleBtn = document.getElementById('adminToggleBtn');

    // open/close admin
    toggleBtn.addEventListener('click', function() {
      panel.classList.toggle('open');
      toggleBtn.textContent = panel.classList.contains('open') ? '✕ CLOSE' : '⚙️ ADMIN';
    });

    // DOM refs
    const rsDisplay = document.getElementById('rsDisplay');
    const weeklyDisplay = document.getElementById('weeklyDisplay');
    const feesDisplay = document.getElementById('feesDisplay');
    const codeDisplay = document.getElementById('codeDisplay');
    const kalyanDisplay = document.getElementById('kalyanDisplay');
    const hintDisplay = document.getElementById('hintDisplay');
    const r1c1 = document.getElementById('r1c1');
    const r1c2 = document.getElementById('r1c2');
    const r1c3 = document.getElementById('r1c3');
    const r2c1 = document.getElementById('r2c1');
    const r2c2 = document.getElementById('r2c2');
    const r2c3 = document.getElementById('r2c3');
    const r2c4 = document.getElementById('r2c4');
    const r2c5 = document.getElementById('r2c5');
    const r2c6 = document.getElementById('r2c6');
    const r3c1 = document.getElementById('r3c1');
    const r3c2 = document.getElementById('r3c2');
    const r3c3 = document.getElementById('r3c3');
    const footerPhone = document.getElementById('footerPhone');
    const footerWeb = document.getElementById('footerWeb');

    // admin inputs
    const adminRs = document.getElementById('adminRs');
    const adminWeekly = document.getElementById('adminWeekly');
    const adminFees = document.getElementById('adminFees');
    const adminCode = document.getElementById('adminCode');
    const adminKalyan = document.getElementById('adminKalyan');
    const adminHint = document.getElementById('adminHint');
    const adminR1c1 = document.getElementById('adminR1c1');
    const adminR1c2 = document.getElementById('adminR1c2');
    const adminR1c3 = document.getElementById('adminR1c3');
    const adminR2 = document.getElementById('adminR2');
    const adminR3 = document.getElementById('adminR3');
    const adminPhone = document.getElementById('adminPhone');
    const adminWeb = document.getElementById('adminWeb');

    // apply function
    function applyChanges() {
      // top
      rsDisplay.textContent = adminRs.value || 'RS.';
      weeklyDisplay.textContent = adminWeekly.value || 'WEEKLY';
      feesDisplay.textContent = adminFees.value || '3000/-';
      codeDisplay.textContent = adminCode.value || '93014 01044';
      kalyanDisplay.textContent = adminKalyan.value || 'KALYAN';
      hintDisplay.textContent = adminHint.value || '(एस आपन दूर क्लोज - जोडी की पट्टी अवश्य करें )';

      // row1
      r1c1.textContent = adminR1c1.value || '3';
      r1c2.textContent = adminR1c2.value || '8';
      r1c3.textContent = adminR1c3.value || '1';

      // row2 (split comma)
      const r2vals = adminR2.value.split(',').map(s => s.trim());
      if (r2vals.length >= 6) {
        r2c1.textContent = r2vals[0] || '355';
        r2c2.textContent = r2vals[1] || '580';
        r2c3.textContent = r2vals[2] || '350';
        r2c4.textContent = r2vals[3] || '558';
        r2c5.textContent = r2vals[4] || '227';
        r2c6.textContent = r2vals[5] || '560';
      } else {
        // fallback
        r2c1.textContent = '355';
        r2c2.textContent = '580';
        r2c3.textContent = '350';
        r2c4.textContent = '558';
        r2c5.textContent = '227';
        r2c6.textContent = '560';
      }

      // row3
      const r3vals = adminR3.value.split(',').map(s => s.trim());
      if (r3vals.length >= 3) {
        r3c1.textContent = r3vals[0] || '3833';
        r3c2.textContent = r3vals[1] || '8388';
        r3c3.textContent = r3vals[2] || '1116';
      } else {
        r3c1.textContent = '3833';
        r3c2.textContent = '8388';
        r3c3.textContent = '1116';
      }

      // footer
      footerPhone.textContent = adminPhone.value || '9301401044';
      footerWeb.textContent = adminWeb.value || 'WWW.KALYANSUBHANK.COM';
    }

    document.getElementById('applyAdminBtn').addEventListener('click', applyChanges);

    // prefill admin fields from current display (so they reflect)
    function syncAdminFromDisplay() {
      adminRs.value = rsDisplay.textContent;
      adminWeekly.value = weeklyDisplay.textContent;
      adminFees.value = feesDisplay.textContent;
      adminCode.value = codeDisplay.textContent;
      adminKalyan.value = kalyanDisplay.textContent;
      adminHint.value = hintDisplay.textContent;
      adminR1c1.value = r1c1.textContent;
      adminR1c2.value = r1c2.textContent;
      adminR1c3.value = r1c3.textContent;
      adminR2.value = `${r2c1.textContent},${r2c2.textContent},${r2c3.textContent},${r2c4.textContent},${r2c5.textContent},${r2c6.textContent}`;
      adminR3.value = `${r3c1.textContent},${r3c2.textContent},${r3c3.textContent}`;
      adminPhone.value = footerPhone.textContent;
      adminWeb.value = footerWeb.textContent;
    }

    // sync when admin opens (but also on load)
    toggleBtn.addEventListener('click', function() {
      if (panel.classList.contains('open')) {
        syncAdminFromDisplay();
      }
    });

    // initial sync
    window.addEventListener('load', function() {
      syncAdminFromDisplay();
    });

    // extra: if someone changes manually we keep it, but apply uses admin values
    // also make sure admin panel is closed by default
    panel.classList.remove('open');
    toggleBtn.textContent = '⚙️ ADMIN';
  })();
</script>

<!-- small note: everything editable, digital style, admin without password -->
</body>
</html>
