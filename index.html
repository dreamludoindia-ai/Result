<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SRIDEVI · MILAN DAY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0e14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            padding: 1rem;
            background-image: radial-gradient(circle at 50% 0%, #1a1f2e 0%, #080b10 100%);
        }

        .container {
            max-width: 760px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .card {
            background: #111827;
            border-radius: 1.5rem;
            padding: 1.5rem 1.8rem 1.8rem;
            border: 1px solid #2a3346;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #f59e0b, #fbbf24, #f59e0b);
            opacity: 0.6;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid #1e293b;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .card-header .title {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.15);
            text-align: center;
            flex: 1;
        }

        .card-header .datetime {
            font-size: 0.75rem;
            font-weight: 500;
            color: #94a3b8;
            letter-spacing: 0.3px;
            background: #1e293b;
            padding: 0.25rem 1rem;
            border-radius: 20px;
            border: 1px solid #2a3346;
        }

        .card-header .live-badge {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #22c55e;
            background: #052e16;
            padding: 0.25rem 0.9rem;
            border-radius: 20px;
            border: 1px solid #22c55e40;
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ===== CENTERED ROWS ===== */
        .otc-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.7rem;
            padding: 0.5rem 1rem;
            background: #0f172a;
            border-radius: 12px;
            border: 1px solid #1e293b;
        }

        .otc-row .label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #94a3b8;
            letter-spacing: 1.5px;
        }

        .otc-row .numbers {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .otc-row .numbers .num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: #e2e8f0;
            background: #0b0f1a;
            padding: 0.1rem 1rem;
            border-radius: 8px;
            border: 1px solid #2a3346;
            min-width: 44px;
            text-align: center;
        }

        .jodi-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.7rem;
            padding: 0.5rem 1rem;
            background: #0f172a;
            border-radius: 12px;
            border: 1px solid #1e293b;
        }

        .jodi-row .label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #94a3b8;
            letter-spacing: 1.5px;
        }

        .jodi-row .numbers {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .jodi-row .numbers .num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 600;
            color: #e2e8f0;
            background: #0b0f1a;
            padding: 0.1rem 0.8rem;
            border-radius: 8px;
            border: 1px solid #2a3346;
            min-width: 48px;
            text-align: center;
        }

        .panel-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            background: #0f172a;
            border-radius: 12px;
            border: 1px solid #1e293b;
            margin-top: 0.1rem;
        }

        .panel-row .label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #94a3b8;
            letter-spacing: 1.5px;
        }

        .panel-row .numbers {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .panel-row .numbers .num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 600;
            color: #fbbf24;
            background: #0b0f1a;
            padding: 0.1rem 0.8rem;
            border-radius: 8px;
            border: 1px solid #fbbf2430;
            min-width: 52px;
            text-align: center;
        }

        .admin-toggle {
            text-align: right;
            margin-top: 0.2rem;
        }

        .admin-toggle button {
            background: #1e293b;
            border: 1px solid #2a3346;
            color: #94a3b8;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.65rem;
            padding: 0.3rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }

        .admin-toggle button:hover {
            background: #2a3346;
            color: #e2e8f0;
            border-color: #fbbf2440;
        }

        .admin-panel {
            margin-top: 1rem;
            background: #0f172a;
            backdrop-filter: blur(8px);
            padding: 1.2rem 1.5rem;
            border-radius: 1rem;
            border: 1px solid #1e293b;
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem 1rem;
            box-shadow: inset 0 0 30px #00000060;
        }

        .admin-panel.open {
            display: grid;
        }

        .admin-panel label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .admin-panel label input {
            background: #0b0f1a;
            border: 1px solid #1e293b;
            padding: 0.25rem 0.6rem;
            border-radius: 8px;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            outline: none;
            transition: 0.2s;
        }

        .admin-panel label input:focus {
            border-color: #fbbf24;
            box-shadow: 0 0 15px #fbbf2410;
        }

        .admin-panel .apply-btn {
            grid-column: 1 / -1;
            background: #fbbf2420;
            border: 1px solid #fbbf24;
            color: #fbbf24;
            font-weight: 700;
            padding: 0.5rem;
            border-radius: 12px;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.2rem;
        }

        .admin-panel .apply-btn:hover {
            background: #fbbf2440;
            box-shadow: 0 0 30px #fbbf2410;
        }

        .admin-panel .reset-btn {
            grid-column: 1 / -1;
            background: #dc262620;
            border: 1px solid #dc2626;
            color: #dc2626;
            font-weight: 700;
            padding: 0.5rem;
            border-radius: 12px;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .admin-panel .reset-btn:hover {
            background: #dc262640;
            box-shadow: 0 0 30px #dc262610;
        }

        @media (max-width: 600px) {
            .card {
                padding: 1rem 1.2rem 1.4rem;
            }
            .card-header .title {
                font-size: 1.1rem;
            }
            .card-header .datetime {
                font-size: 0.6rem;
                padding: 0.15rem 0.7rem;
            }
            .otc-row .numbers .num {
                font-size: 1.6rem;
                min-width: 36px;
                padding: 0.05rem 0.7rem;
            }
            .jodi-row .numbers .num {
                font-size: 1.2rem;
                min-width: 40px;
                padding: 0.05rem 0.6rem;
            }
            .panel-row .numbers .num {
                font-size: 1.2rem;
                min-width: 42px;
                padding: 0.05rem 0.6rem;
            }
            .admin-panel {
                grid-template-columns: 1fr;
                padding: 0.8rem 1rem;
            }
        }

        @media (max-width: 450px) {
            .card-header {
                flex-wrap: wrap;
                gap: 0.3rem;
                justify-content: center;
            }
            .card-header .title {
                width: 100%;
                text-align: center;
            }
            .otc-row,
            .jodi-row,
            .panel-row {
                padding: 0.4rem 0.7rem;
            }
            .otc-row .numbers .num {
                font-size: 1.3rem;
                min-width: 30px;
                padding: 0.05rem 0.5rem;
            }
            .jodi-row .numbers .num {
                font-size: 1rem;
                min-width: 34px;
                padding: 0.05rem 0.4rem;
            }
            .panel-row .numbers .num {
                font-size: 1rem;
                min-width: 36px;
                padding: 0.05rem 0.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== CARD 1: SRIDEVI ===== -->
        <div class="card" id="card1">
            <div class="card-header">
                <span class="title" id="title1">SRIDEVI</span>
                <span class="datetime" id="datetime1">16/06/2026 10:35 AM</span>
                <span class="live-badge" id="live1">● LIVE</span>
            </div>

            <div class="otc-row">
                <span class="label" id="otcLabel1">OTC</span>
                <div class="numbers" id="otc1">
                    <span class="num">9</span>
                    <span class="num">0</span>
                    <span class="num">5</span>
                    <span class="num">4</span>
                </div>
            </div>

            <div class="jodi-row">
                <span class="label" id="jodiLabel1">Jodi</span>
                <div class="numbers" id="jodi1">
                    <span class="num">91</span>
                    <span class="num">92</span>
                    <span class="num">07</span>
                    <span class="num">06</span>
                    <span class="num">51</span>
                    <span class="num">57</span>
                    <span class="num">42</span>
                    <span class="num">46</span>
                </div>
            </div>

            <div class="panel-row">
                <span class="label" id="panelLabel1">Panel</span>
                <div class="numbers" id="panel1">
                    <span class="num">889</span>
                    <span class="num">127</span>
                    <span class="num">469</span>
                    <span class="num">568</span>
                    <span class="num">370</span>
                    <span class="num">690</span>
                    <span class="num">149</span>
                    <span class="num">257</span>
                    <span class="num">239</span>
                </div>
            </div>
        </div>

        <!-- ===== CARD 2: MILAN DAY ===== -->
        <div class="card" id="card2">
            <div class="card-header">
                <span class="title" id="title2">MILAN DAY</span>
                <span class="datetime" id="datetime2">11/6/2026 1:35 PM</span>
                <span class="live-badge" id="live2">● LIVE</span>
            </div>

            <div class="otc-row">
                <span class="label" id="otcLabel2">OTC</span>
                <div class="numbers" id="otc2">
                    <span class="num">3</span>
                    <span class="num">8</span>
                    <span class="num">9</span>
                    <span class="num">1</span>
                </div>
            </div>

            <div class="jodi-row">
                <span class="label" id="jodiLabel2">Jodi</span>
                <div class="numbers" id="jodi2">
                    <span class="num">30</span>
                    <span class="num">34</span>
                    <span class="num">96</span>
                    <span class="num">95</span>
                    <span class="num">87</span>
                    <span class="num">86</span>
                    <span class="num">14</span>
                    <span class="num">17</span>
                </div>
            </div>

            <div class="panel-row">
                <span class="label" id="panelLabel2">Panel</span>
                <div class="numbers" id="panel2">
                    <span class="num">247</span>
                    <span class="num">490</span>
                    <span class="num">125</span>
                    <span class="num">279</span>
                    <span class="num">234</span>
                    <span class="num">379</span>
                    <span class="num">245</span>
                    <span class="num">489</span>
                </div>
            </div>
        </div>

        <!-- ===== ADMIN ===== -->
        <div class="admin-toggle">
            <button id="adminToggleBtn">⚙️ ADMIN</button>
        </div>

        <div class="admin-panel" id="adminPanel">
            <label>Title 1 <input type="text" id="aTitle1"></label>
            <label>Date/Time 1 <input type="text" id="aDatetime1"></label>
            <label>Live Badge 1 <input type="text" id="aLive1"></label>
            <label>OTC Label 1 <input type="text" id="aOtcLabel1"></label>
            <label>Jodi Label 1 <input type="text" id="aJodiLabel1"></label>
            <label>Panel Label 1 <input type="text" id="aPanelLabel1"></label>
            <label>OTC 1 (space) <input type="text" id="aOtc1"></label>
            <label>Jodi 1 (space) <input type="text" id="aJodi1"></label>
            <label>Panel 1 (space) <input type="text" id="aPanel1"></label>

            <label>Title 2 <input type="text" id="aTitle2"></label>
            <label>Date/Time 2 <input type="text" id="aDatetime2"></label>
            <label>Live Badge 2 <input type="text" id="aLive2"></label>
            <label>OTC Label 2 <input type="text" id="aOtcLabel2"></label>
            <label>Jodi Label 2 <input type="text" id="aJodiLabel2"></label>
            <label>Panel Label 2 <input type="text" id="aPanelLabel2"></label>
            <label>OTC 2 (space) <input type="text" id="aOtc2"></label>
            <label>Jodi 2 (space) <input type="text" id="aJodi2"></label>
            <label>Panel 2 (space) <input type="text" id="aPanel2"></label>

            <button class="apply-btn" id="applyBtn">⟳ APPLY CHANGES</button>
            <button class="reset-btn" id="resetBtn">↺ RESET TO DEFAULT</button>
        </div>
    </div>

    <script>
        (function() {
            const DEFAULTS = {
                title1: 'SRIDEVI',
                datetime1: '16/06/2026 10:35 AM',
                live1: '● LIVE',
                otcLabel1: 'OTC',
                jodiLabel1: 'Jodi',
                panelLabel1: 'Panel',
                otc1: '9 0 5 4',
                jodi1: '91 92 07 06 51 57 42 46',
                panel1: '889 127 469 568 370 690 149 257 239',

                title2: 'MILAN DAY',
                datetime2: '11/6/2026 1:35 PM',
                live2: '● LIVE',
                otcLabel2: 'OTC',
                jodiLabel2: 'Jodi',
                panelLabel2: 'Panel',
                otc2: '3 8 9 1',
                jodi2: '30 34 96 95 87 86 14 17',
                panel2: '247 490 125 279 234 379 245 489'
            };

            const STORAGE_KEY = 'kalyan_market_data';

            const $ = (id) => document.getElementById(id);
            const adminPanel = $('adminPanel');
            const toggleBtn = $('adminToggleBtn');

            const title1 = $('title1'),
                datetime1 = $('datetime1'),
                live1 = $('live1'),
                otcLabel1 = $('otcLabel1'),
                jodiLabel1 = $('jodiLabel1'),
                panelLabel1 = $('panelLabel1');
            const title2 = $('title2'),
                datetime2 = $('datetime2'),
                live2 = $('live2'),
                otcLabel2 = $('otcLabel2'),
                jodiLabel2 = $('jodiLabel2'),
                panelLabel2 = $('panelLabel2');

            const aTitle1 = $('aTitle1'),
                aDatetime1 = $('aDatetime1'),
                aLive1 = $('aLive1'),
                aOtcLabel1 = $('aOtcLabel1'),
                aJodiLabel1 = $('aJodiLabel1'),
                aPanelLabel1 = $('aPanelLabel1'),
                aOtc1 = $('aOtc1'),
                aJodi1 = $('aJodi1'),
                aPanel1 = $('aPanel1');

            const aTitle2 = $('aTitle2'),
                aDatetime2 = $('aDatetime2'),
                aLive2 = $('aLive2'),
                aOtcLabel2 = $('aOtcLabel2'),
                aJodiLabel2 = $('aJodiLabel2'),
                aPanelLabel2 = $('aPanelLabel2'),
                aOtc2 = $('aOtc2'),
                aJodi2 = $('aJodi2'),
                aPanel2 = $('aPanel2');

            function updateNumbers(containerId, values) {
                const container = document.getElementById(containerId);
                if (!container) return;
                const nums = values.split(/\s+/).filter(s => s);
                container.innerHTML = nums.map(v => `<span class="num">${v.trim()}</span>`).join('');
            }

            function getNumbers(containerId) {
                const els = document.getElementById(containerId).querySelectorAll('.num');
                return Array.from(els).map(el => el.textContent).join(' ');
            }

            function saveData(data) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }

            function loadData() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) return JSON.parse(raw);
                } catch (e) { /* ignore */ }
                return null;
            }

            function renderData(data) {
                title1.textContent = data.title1;
                datetime1.textContent = data.datetime1;
                live1.textContent = data.live1;
                otcLabel1.textContent = data.otcLabel1;
                jodiLabel1.textContent = data.jodiLabel1;
                panelLabel1.textContent = data.panelLabel1;
                updateNumbers('otc1', data.otc1);
                updateNumbers('jodi1', data.jodi1);
                updateNumbers('panel1', data.panel1);

                title2.textContent = data.title2;
                datetime2.textContent = data.datetime2;
                live2.textContent = data.live2;
                otcLabel2.textContent = data.otcLabel2;
                jodiLabel2.textContent = data.jodiLabel2;
                panelLabel2.textContent = data.panelLabel2;
                updateNumbers('otc2', data.otc2);
                updateNumbers('jodi2', data.jodi2);
                updateNumbers('panel2', data.panel2);
            }

            function syncAdmin() {
                aTitle1.value = title1.textContent;
                aDatetime1.value = datetime1.textContent;
                aLive1.value = live1.textContent;
                aOtcLabel1.value = otcLabel1.textContent;
                aJodiLabel1.value = jodiLabel1.textContent;
                aPanelLabel1.value = panelLabel1.textContent;
                aOtc1.value = getNumbers('otc1');
                aJodi1.value = getNumbers('jodi1');
                aPanel1.value = getNumbers('panel1');

                aTitle2.value = title2.textContent;
                aDatetime2.value = datetime2.textContent;
                aLive2.value = live2.textContent;
                aOtcLabel2.value = otcLabel2.textContent;
                aJodiLabel2.value = jodiLabel2.textContent;
                aPanelLabel2.value = panelLabel2.textContent;
                aOtc2.value = getNumbers('otc2');
                aJodi2.value = getNumbers('jodi2');
                aPanel2.value = getNumbers('panel2');
            }

            function applyChanges() {
                const data = {
                    title1: aTitle1.value || DEFAULTS.title1,
                    datetime1: aDatetime1.value || DEFAULTS.datetime1,
                    live1: aLive1.value || DEFAULTS.live1,
                    otcLabel1: aOtcLabel1.value || DEFAULTS.otcLabel1,
                    jodiLabel1: aJodiLabel1.value || DEFAULTS.jodiLabel1,
                    panelLabel1: aPanelLabel1.value || DEFAULTS.panelLabel1,
                    otc1: aOtc1.value || DEFAULTS.otc1,
                    jodi1: aJodi1.value || DEFAULTS.jodi1,
                    panel1: aPanel1.value || DEFAULTS.panel1,

                    title2: aTitle2.value || DEFAULTS.title2,
                    datetime2: aDatetime2.value || DEFAULTS.datetime2,
                    live2: aLive2.value || DEFAULTS.live2,
                    otcLabel2: aOtcLabel2.value || DEFAULTS.otcLabel2,
                    jodiLabel2: aJodiLabel2.value || DEFAULTS.jodiLabel2,
                    panelLabel2: aPanelLabel2.value || DEFAULTS.panelLabel2,
                    otc2: aOtc2.value || DEFAULTS.otc2,
                    jodi2: aJodi2.value || DEFAULTS.jodi2,
                    panel2: aPanel2.value || DEFAULTS.panel2
                };

                renderData(data);
                saveData(data);
            }

            function resetToDefault() {
                renderData(DEFAULTS);
                saveData(DEFAULTS);
                syncAdmin();
            }

            function init() {
                const saved = loadData();
                if (saved) {
                    renderData(saved);
                } else {
                    renderData(DEFAULTS);
                    saveData(DEFAULTS);
                }
                syncAdmin();

                $('applyBtn').addEventListener('click', applyChanges);
                $('resetBtn').addEventListener('click', resetToDefault);

                toggleBtn.addEventListener('click', function() {
                    adminPanel.classList.toggle('open');
                    toggleBtn.textContent = adminPanel.classList.contains('open') ? '✕ CLOSE' : '⚙️ ADMIN';
                    if (adminPanel.classList.contains('open')) syncAdmin();
                });

                adminPanel.classList.remove('open');
                toggleBtn.textContent = '⚙️ ADMIN';
            }

            document.addEventListener('DOMContentLoaded', init);
        })();
    </script>
</body>
</html>
