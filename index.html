<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>Kalyan · Royal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Playfair+Display:ital,wght@0,600;0,700;1,700&family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a070e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      padding: 1rem;
      background-image: radial-gradient(circle at 30% 20%, #1a1228 0%, #08050d 90%);
    }

    .panel {
      max-width: 560px;
      width: 100%;
      background: #110d1a;
      background-image: linear-gradient(160deg, #1a1327 0%, #0e0b16 100%);
      border-radius: 2.2rem 2.2rem 1.8rem 1.8rem;
      padding: 1.8rem 2rem 2.2rem;
      box-shadow: 0 25px 60px rgba(0,0,0,0.95), inset 0 0 0 1px #d4af3760, 0 0 40px #b8860b25;
      border: 1px solid #d4af3750;
      position: relative;
      transition: all 0.2s;
    }

    /* Royal 3D gold border */
    .panel::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 2.4rem;
      padding: 2.5px;
      background: linear-gradient(135deg, #d4af37, #b8860b, #d4af37, #8b6914, #d4af37);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.7;
    }

    .panel::after {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 1.8rem;
      box-shadow: inset 0 10px 30px rgba(0,0,0,0.9), inset 0 -6px 20px rgba(212,175,55,0.06);
      pointer-events: none;
    }

    /* RS + WEEKLY + FEES row */
    .top-badge {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0b0813;
      padding: 0.4rem 1.5rem 0.4rem 2rem;
      border-radius: 60px;
      margin-bottom: 1.2rem;
      border: 1px solid #d4af3740;
      box-shadow: inset 0 2px 8px #00000080, 0 0 15px #b8860b10;
      position: relative;
      z-index: 2;
    }

    .top-badge .rs {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: 2px;
      color: #ecd8a5;
      text-shadow: 0 0 12px #d4af37, 0 0 30px #b8860b30;
    }

    .top-badge .weekly {
      font-family: 'Orbitron', monospace;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 2px;
      color: #c9b8e6;
      background: #1f1730;
      padding: 0.15rem 1rem;
      border-radius: 30px;
      border: 1px solid #d4af3760;
      text-transform: uppercase;
    }

    .top-badge .fees {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 1.7rem;
      letter-spacing: 2px;
      color: #ecd8a5;
      text-shadow: 0 0 12px #d4af37, 0 0 30px #b8860b30;
    }

    /* Code + KALYAN row */
    .code-block {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0b0813;
      padding: 0.4rem 1.2rem 0.4rem 2rem;
      border-radius: 60px;
      margin-bottom: 1.2rem;
      border: 1px solid #d4af3740;
      box-shadow: inset 0 2px 10px #00000080, 0 0 15px #b8860b10;
      position: relative;
      z-index: 2;
    }

    .code-block .big-code {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 2rem;
      letter-spacing: 4px;
      color: #f5e7d0;
      text-shadow: 0 0 10px #d4af37, 0 0 30px #d4af3740;
    }

    .code-block .label-kalyan {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 2rem;
      font-style: italic;
      background: linear-gradient(145deg, #f5d77b, #b8860b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px #d4af3760;
      letter-spacing: 3px;
    }

    /* Hint text */
    .hint-text {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.3px;
      color: #d0c8e0;
      background: #15101f;
      padding: 0.4rem 1.5rem;
      border-radius: 40px;
      display: inline-block;
      margin-bottom: 1.5rem;
      border-left: 4px solid #d4af37;
      box-shadow: inset 0 2px 6px #00000060;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    /* Row 1: 3 numbers */
    .number-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-bottom: 1.2rem;
      position: relative;
      z-index: 2;
    }

    .number-grid .num-item {
      background: #0d0a16;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 2.4rem;
      text-align: center;
      padding: 0.5rem 0.2rem;
      border-radius: 24px;
      color: #f5e7d0;
      border: 1px solid #d4af3730;
      box-shadow: 0 5px 0 #06040a, 0 8px 20px rgba(0,0,0,0.7), inset 0 -3px 6px rgba(212,175,55,0.08);
      background: #100d1c;
      transform: translateY(-2px);
      letter-spacing: 2px;
      transition: all 0.05s;
    }

    .number-grid .num-item::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 15%;
      right: 15%;
      height: 25%;
      background: linear-gradient(180deg, rgba(212,175,55,0.12) 0%, transparent 100%);
      border-radius: 20px;
      pointer-events: none;
    }

    .number-grid .num-item {
      position: relative;
    }

    /* Row 2: 6 numbers */
    .grid-row-2 {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0.5rem;
      margin-bottom: 1.2rem;
      position: relative;
      z-index: 2;
    }

    .grid-row-2 .num-sm {
      background: #0b0813;
      font-family: 'Orbitron', monospace;
      font-weight: 600;
      font-size: 1.2rem;
      text-align: center;
      padding: 0.4rem 0.1rem;
      border-radius: 24px;
      color: #d4cce8;
      border: 1px solid #d4af3720;
      box-shadow: 0 4px 0 #06040a, 0 6px 14px rgba(0,0,0,0.6);
      letter-spacing: 1px;
      background: #0d0a16;
    }

    /* Row 3: 4-digit numbers */
    .grid-row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 2;
    }

    .grid-row-3 .num-lg {
      background: #0b0813;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 2rem;
      text-align: center;
      padding: 0.5rem 0.1rem;
      border-radius: 24px;
      color: #f5e7d0;
      border: 1px solid #d4af3730;
      box-shadow: 0 5px 0 #06040a, 0 8px 24px rgba(0,0,0,0.7), inset 0 -3px 6px rgba(212,175,55,0.05);
      letter-spacing: 3px;
      background: #0f0c1a;
      transform: translateY(-2px);
      position: relative;
    }

    .grid-row-3 .num-lg::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 12%;
      right: 12%;
      height: 25%;
      background: linear-gradient(180deg, rgba(212,175,55,0.10) 0%, transparent 100%);
      border-radius: 20px;
      pointer-events: none;
    }

    /* Footer */
    .footer-line {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      background: #0b0813;
      padding: 0.4rem 1.5rem;
      border-radius: 60px;
      border: 1px solid #d4af3730;
      box-shadow: inset 0 2px 8px #00000080;
      position: relative;
      z-index: 2;
    }

    .footer-line .raj {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      color: #d4cce8;
      letter-spacing: 0.5px;
    }

    .footer-line .raj span {
      color: #d4af37;
      font-weight: 700;
    }

    .footer-line .phone {
      font-family: 'Orbitron', monospace;
      font-weight: 600;
      font-size: 1rem;
      color: #ecd8a5;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #d4af3730;
    }

    .footer-line .web {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.7rem;
      color: #b09ec8;
      letter-spacing: 0.5px;
      border-bottom: 1px dashed #d4af3750;
    }

    /* Admin */
    .admin-toggle {
      margin-top: 1.2rem;
      text-align: right;
      position: relative;
      z-index: 2;
    }

    .admin-toggle button {
      background: #1f1730;
      border: 1px solid #d4af3740;
      color: #c9b8e6;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.7rem;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 1px;
      backdrop-filter: blur(4px);
      background: #0b0813b0;
    }

    .admin-toggle button:hover {
      background: #d4af3720;
      color: #ecd8a5;
      border-color: #d4af37;
      box-shadow: 0 0 25px #d4af3720;
    }

    .admin-panel {
      margin-top: 1rem;
      background: #0f0b1ab0;
      backdrop-filter: blur(8px);
      padding: 1.2rem 1.5rem;
      border-radius: 30px;
      border: 1px solid #d4af3730;
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem 1.2rem;
      box-shadow: inset 0 0 25px #00000080;
      position: relative;
      z-index: 5;
    }

    .admin-panel.open {
      display: grid;
    }

    .admin-panel label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #b09ec8;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .admin-panel label input {
      background: #0b0813;
      border: 1px solid #d4af3740;
      padding: 0.3rem 0.7rem;
      border-radius: 30px;
      color: #f5e7d0;
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      outline: none;
      transition: 0.2s;
    }

    .admin-panel label input:focus {
      border-color: #d4af37;
      box-shadow: 0 0 20px #d4af3715;
    }

    .admin-panel .apply-btn {
      grid-column: 1 / -1;
      background: #d4af3730;
      border: 1px solid #d4af37;
      color: #ecd8a5;
      font-weight: 700;
      padding: 0.6rem;
      border-radius: 60px;
      font-size: 0.8rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.2rem;
      backdrop-filter: blur(4px);
    }

    .admin-panel .apply-btn:hover {
      background: #d4af3760;
      box-shadow: 0 0 30px #d4af3720;
    }

    @media (max-width: 500px) {
      .panel { padding: 1.2rem; }
      .top-badge .rs { font-size: 1.2rem; }
      .top-badge .fees { font-size: 1.3rem; }
      .top-badge .weekly { font-size: 0.7rem; }
      .code-block .big-code { font-size: 1.3rem; letter-spacing: 2px; }
      .code-block .label-kalyan { font-size: 1.4rem; }
      .number-grid .num-item { font-size: 1.8rem; }
      .grid-row-2 .num-sm { font-size: 0.9rem; }
      .grid-row-3 .num-lg { font-size: 1.4rem; }
      .footer-line .phone { font-size: 0.75rem; }
      .admin-panel { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="panel" id="mainPanel">

  <!-- RS + WEEKLY + FEES -->
  <div class="top-badge">
    <span class="rs" id="rsDisplay">RS.</span>
    <span class="weekly" id="weeklyDisplay">WEEKLY</span>
    <span class="fees" id="feesDisplay">3000/-</span>
  </div>

  <!-- Code + KALYAN -->
  <div class="code-block">
    <span class="big-code" id="codeDisplay">93014 01044</span>
    <span class="label-kalyan" id="kalyanDisplay">KALYAN</span>
  </div>

  <!-- Hint -->
  <div class="hint-text" id="hintDisplay">(एस आपन दूर क्लोज - जोडी की पट्टी अवश्य करें )</div>

  <!-- Row 1: 3 8 1 -->
  <div class="number-grid" id="row1Grid">
    <div class="num-item" id="r1c1">3</div>
    <div class="num-item" id="r1c2">8</div>
    <div class="num-item" id="r1c3">1</div>
  </div>

  <!-- Row 2: 6 numbers -->
  <div class="grid-row-2" id="row2Grid">
    <div class="num-sm" id="r2c1">355</div>
    <div class="num-sm" id="r2c2">580</div>
    <div class="num-sm" id="r2c3">350</div>
    <div class="num-sm" id="r2c4">558</div>
    <div class="num-sm" id="r2c5">227</div>
    <div class="num-sm" id="r2c6">560</div>
  </div>

  <!-- Row 3: 4-digit numbers -->
  <div class="grid-row-3" id="row3Grid">
    <div class="num-lg" id="r3c1">3833</div>
    <div class="num-lg" id="r3c2">8388</div>
    <div class="num-lg" id="r3c3">1116</div>
  </div>

  <!-- Footer -->
  <div class="footer-line">
    <span class="raj">पो. <span>राज सर</span> - <span id="footerPhone">9301401044</span></span>
    <span class="web" id="footerWeb">WWW.KALYANSUBHANK.COM</span>
  </div>

  <!-- Admin Toggle -->
  <div class="admin-toggle">
    <button id="adminToggleBtn">⚜️ ADMIN</button>
  </div>

  <!-- Admin Panel -->
  <div class="admin-panel" id="adminPanel">
    <label>RS <input type="text" id="adminRs" value="RS."></label>
    <label>WEEKLY <input type="text" id="adminWeekly" value="WEEKLY"></label>
    <label>FEES <input type="text" id="adminFees" value="3000/-"></label>
    <label>CODE <input type="text" id="adminCode" value="93014 01044"></label>
    <label>KALYAN <input type="text" id="adminKalyan" value="KALYAN"></label>
    <label>HINT <input type="text" id="adminHint" value="(एस आपन दूर क्लोज - जोडी की पट्टी अवश्य करें )"></label>
    <label>R1C1 <input type="text" id="adminR1c1" value="3"></label>
    <label>R1C2 <input type="text" id="adminR1c2" value="8"></label>
    <label>R1C3 <input type="text" id="adminR1c3" value="1"></label>
    <label>R2 (6 nums) <input type="text" id="adminR2" value="355,580,350,558,227,560"></label>
    <label>R3 (3 nums) <input type="text" id="adminR3" value="3833,8388,1116"></label>
    <label>FOOTER PHONE <input type="text" id="adminPhone" value="9301401044"></label>
    <label>WEBSITE <input type="text" id="adminWeb" value="WWW.KALYANSUBHANK.COM"></label>
    <button class="apply-btn" id="applyAdminBtn">⟳ APPLY CHANGES</button>
  </div>
</div>

<script>
  (function() {
    const adminPanel = document.getElementById('adminPanel');
    const toggleBtn = document.getElementById('adminToggleBtn');

    toggleBtn.addEventListener('click', function() {
      adminPanel.classList.toggle('open');
      toggleBtn.textContent = adminPanel.classList.contains('open') ? '✕ CLOSE' : '⚜️ ADMIN';
      if (adminPanel.classList.contains('open')) syncAdminFromDisplay();
    });

    // DOM refs
    const rsDisplay = document.getElementById('rsDisplay');
    const weeklyDisplay = document.getElementById('weeklyDisplay');
    const feesDisplay = document.getElementById('feesDisplay');
    const codeDisplay = document.getElementById('codeDisplay');
    const kalyanDisplay = document.getElementById('kalyanDisplay');
    const hintDisplay = document.getElementById('hintDisplay');
    const r1c1 = document.getElementById('r1c1');
    const r1c2 = document.getElementById('r1c2');
    const r1c3 = document.getElementById('r1c3');
    const r2c1 = document.getElementById('r2c1');
    const r2c2 = document.getElementById('r2c2');
    const r2c3 = document.getElementById('r2c3');
    const r2c4 = document.getElementById('r2c4');
    const r2c5 = document.getElementById('r2c5');
    const r2c6 = document.getElementById('r2c6');
    const r3c1 = document.getElementById('r3c1');
    const r3c2 = document.getElementById('r3c2');
    const r3c3 = document.getElementById('r3c3');
    const footerPhone = document.getElementById('footerPhone');
    const footerWeb = document.getElementById('footerWeb');

    // Admin inputs
    const adminRs = document.getElementById('adminRs');
    const adminWeekly = document.getElementById('adminWeekly');
    const adminFees = document.getElementById('adminFees');
    const adminCode = document.getElementById('adminCode');
    const adminKalyan = document.getElementById('adminKalyan');
    const adminHint = document.getElementById('adminHint');
    const adminR1c1 = document.getElementById('adminR1c1');
    const adminR1c2 = document.getElementById('adminR1c2');
    const adminR1c3 = document.getElementById('adminR1c3');
    const adminR2 = document.getElementById('adminR2');
    const adminR3 = document.getElementById('adminR3');
    const adminPhone = document.getElementById('adminPhone');
    const adminWeb = document.getElementById('adminWeb');

    function applyChanges() {
      rsDisplay.textContent = adminRs.value || 'RS.';
      weeklyDisplay.textContent = adminWeekly.value || 'WEEKLY';
      feesDisplay.textContent = adminFees.value || '3000/-';
      codeDisplay.textContent = adminCode.value || '93014 01044';
      kalyanDisplay.textContent = adminKalyan.value || 'KALYAN';
      hintDisplay.textContent = adminHint.value || '(एस आपन दूर क्लोज - जोडी की पट्टी अवश्य करें )';

      r1c1.textContent = adminR1c1.value || '3';
      r1c2.textContent = adminR1c2.value || '8';
      r1c3.textContent = adminR1c3.value || '1';

      const r2vals = adminR2.value.split(',').map(s => s.trim());
      if (r2vals.length >= 6) {
        r2c1.textContent = r2vals[0] || '355';
        r2c2.textContent = r2vals[1] || '580';
        r2c3.textContent = r2vals[2] || '350';
        r2c4.textContent = r2vals[3] || '558';
        r2c5.textContent = r2vals[4] || '227';
        r2c6.textContent = r2vals[5] || '560';
      }

      const r3vals = adminR3.value.split(',').map(s => s.trim());
      if (r3vals.length >= 3) {
        r3c1.textContent = r3vals[0] || '3833';
        r3c2.textContent = r3vals[1] || '8388';
        r3c3.textContent = r3vals[2] || '1116';
      }

      footerPhone.textContent = adminPhone.value || '9301401044';
      footerWeb.textContent = adminWeb.value || 'WWW.KALYANSUBHANK.COM';
    }

    function syncAdminFromDisplay() {
      adminRs.value = rsDisplay.textContent;
      adminWeekly.value = weeklyDisplay.textContent;
      adminFees.value = feesDisplay.textContent;
      adminCode.value = codeDisplay.textContent;
      adminKalyan.value = kalyanDisplay.textContent;
      adminHint.value = hintDisplay.textContent;
      adminR1c1.value = r1c1.textContent;
      adminR1c2.value = r1c2.textContent;
      adminR1c3.value = r1c3.textContent;
      adminR2.value = `${r2c1.textContent},${r2c2.textContent},${r2c3.textContent},${r2c4.textContent},${r2c5.textContent},${r2c6.textContent}`;
      adminR3.value = `${r3c1.textContent},${r3c2.textContent},${r3c3.textContent}`;
      adminPhone.value = footerPhone.textContent;
      adminWeb.value = footerWeb.textContent;
    }

    document.getElementById('applyAdminBtn').addEventListener('click', applyChanges);
    window.addEventListener('load', syncAdminFromDisplay);
    adminPanel.classList.remove('open');
    toggleBtn.textContent = '⚜️ ADMIN';
  })();
</script>
</body>
</html>
