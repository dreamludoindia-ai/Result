<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
  <title>Royal · Kalyan Markets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Playfair+Display:ital,wght@0,600;0,700;1,700&family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b080e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      padding: 0.8rem;
      background-image: radial-gradient(circle at 20% 30%, #1f1728 0%, #0a0710 90%);
    }

    .panel {
      max-width: 520px;
      width: 100%;
      background: #110d1a;
      background-image: linear-gradient(145deg, #1a1327 0%, #0e0b16 100%);
      border-radius: 1.8rem 1.8rem 1.5rem 1.5rem;
      padding: 1rem 1.2rem 1.5rem;
      box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 0 1px #d4af3750, 0 0 30px #b8860b20;
      border: 1px solid #d4af3750;
      position: relative;
      transition: all 0.2s;
    }
    .panel::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 2rem;
      padding: 2px;
      background: linear-gradient(135deg, #d4af37, #b8860b, #d4af37, #8b6914);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.6;
    }
    .panel::after {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 1.4rem;
      box-shadow: inset 0 8px 20px rgba(0,0,0,0.8), inset 0 -4px 12px rgba(212,175,55,0.08);
      pointer-events: none;
    }

    .top-royal {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0b0813;
      padding: 0.15rem 0.8rem 0.15rem 1.2rem;
      border-radius: 40px;
      margin-bottom: 0.7rem;
      border: 1px solid #d4af3740;
      box-shadow: inset 0 2px 6px #00000080, 0 0 12px #b8860b10;
      position: relative;
      z-index: 2;
    }
    .top-royal .royal-title {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 0.85rem;
      font-style: italic;
      color: #ecd8a5;
      text-shadow: 0 0 10px #d4af37, 0 0 25px #b8860b30;
      letter-spacing: 0.5px;
    }
    .top-royal .weekly-badge {
      font-family: 'Orbitron', monospace;
      font-weight: 600;
      font-size: 0.55rem;
      letter-spacing: 1.5px;
      color: #c9b8e6;
      background: #1f1730;
      padding: 0.1rem 0.7rem;
      border-radius: 20px;
      border: 1px solid #d4af3760;
      text-transform: uppercase;
    }
    .top-royal .fees-badge {
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 1px;
      color: #ecd8a5;
      text-shadow: 0 0 8px #d4af37, 0 0 20px #b8860b20;
    }

    .code-block {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0b0813;
      padding: 0.2rem 0.8rem 0.2rem 1.2rem;
      border-radius: 40px;
      margin-bottom: 0.7rem;
      border: 1px solid #d4af3740;
      box-shadow: inset 0 2px 8px #00000080, 0 0 10px #b8860b10;
      position: relative;
      z-index: 2;
    }
    .code-block .big-code {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 1.2rem;
      letter-spacing: 2px;
      color: #f5e7d0;
      text-shadow: 0 0 6px #d4af37, 0 0 20px #d4af3730;
    }
    .code-block .label-kalyan {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 1.2rem;
      font-style: italic;
      background: linear-gradient(145deg, #f5d77b, #b8860b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px #d4af3760;
      letter-spacing: 2px;
    }

    .hint-text {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.55rem;
      letter-spacing: 0.2px;
      color: #d0c8e0;
      background: #15101f;
      padding: 0.15rem 0.8rem;
      border-radius: 30px;
      display: inline-block;
      margin-bottom: 0.7rem;
      border-left: 2px solid #d4af37;
      box-shadow: inset 0 2px 4px #00000060;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .markets-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.4rem;
      margin-bottom: 0.8rem;
      position: relative;
      z-index: 2;
    }
    .market-item {
      background: #0d0a16;
      font-family: 'Orbitron', monospace;
      font-weight: 600;
      font-size: 0.7rem;
      text-align: center;
      padding: 0.3rem 0.1rem;
      border-radius: 20px;
      color: #d4cce8;
      border: 1px solid #d4af3730;
      box-shadow: 0 4px 0 #0a0710, 0 6px 12px rgba(0,0,0,0.6), inset 0 -2px 4px rgba(212,175,55,0.1);
      background: #100d1c;
      transition: all 0.05s ease;
      letter-spacing: 0.5px;
      position: relative;
      transform: translateY(-2px);
    }
    .market-item::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 8px;
      right: 8px;
      height: 30%;
      background: linear-gradient(180deg, rgba(212,175,55,0.15) 0%, transparent 100%);
      border-radius: 20px;
      pointer-events: none;
    }
    .market-item span {
      display: block;
      font-size: 0.45rem;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      color: #b09ec8;
      letter-spacing: 0.3px;
      margin-top: 1px;
      opacity: 0.8;
    }
    .market-item:hover {
      border-color: #d4af3760;
      box-shadow: 0 2px 0 #0a0710, 0 8px 20px rgba(212,175,55,0.15);
      transform: translateY(-3px);
    }

    .grid-row-2 {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0.3rem;
      margin-bottom: 0.7rem;
      position: relative;
      z-index: 2;
    }
    .grid-row-2 .num-sm {
      background: #0b0813;
      font-family: 'Orbitron', monospace;
      font-weight: 600;
      font-size: 0.7rem;
      text-align: center;
      padding: 0.2rem 0.1rem;
      border-radius: 20px;
      color: #d4cce8;
      border: 1px solid #d4af3720;
      box-shadow: 0 3px 0 #06040a, 0 4px 10px rgba(0,0,0,0.5);
      letter-spacing: 1px;
      background: #0d0a16;
    }

    .grid-row-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.4rem;
      margin-bottom: 0.8rem;
      position: relative;
      z-index: 2;
    }
    .grid-row-3 .num-lg {
      background: #0b0813;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 1.1rem;
      text-align: center;
      padding: 0.2rem 0.1rem;
      border-radius: 20px;
      color: #f5e7d0;
      border: 1px solid #d4af3730;
      box-shadow: 0 4px 0 #06040a, 0 6px 16px rgba(0,0,0,0.6), inset 0 -2px 4px rgba(212,175,55,0.05);
      letter-spacing: 2px;
      background: #0f0c1a;
      transform: translateY(-2px);
    }

    .footer-line {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      background: #0b0813;
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      border: 1px solid #d4af3730;
      margin-top: 0.2rem;
      box-shadow: inset 0 2px 6px #00000080;
      position: relative;
      z-index: 2;
    }
    .footer-line .raj {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 0.6rem;
      color: #d4cce8;
      letter-spacing: 0.3px;
    }
    .footer-line .raj span {
      color: #d4af37;
    }
    .footer-line .phone {
      font-family: 'Orbitron', monospace;
      font-weight: 600;
      font-size: 0.65rem;
      color: #ecd8a5;
      letter-spacing: 1px;
      text-shadow: 0 0 6px #d4af3730;
    }
    .footer-line .web {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.5rem;
      color: #b09ec8;
      letter-spacing: 0.3px;
      border-bottom: 1px dashed #d4af3750;
    }

    .admin-toggle {
      margin-top: 0.8rem;
      text-align: right;
      position: relative;
      z-index: 2;
    }
    .admin-toggle button {
      background: #1f1730;
      border: 1px solid #d4af3740;
      color: #c9b8e6;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.55rem;
      padding: 0.2rem 0.9rem;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.2s;
      letter-spacing: 0.5px;
      backdrop-filter: blur(4px);
      background: #0b0813b0;
    }
    .admin-toggle button:hover {
      background: #d4af3720;
      color: #ecd8a5;
      border-color: #d4af37;
      box-shadow: 0 0 20px #d4af3720;
    }

    .admin-panel {
      margin-top: 0.7rem;
      background: #0f0b1ab0;
      backdrop-filter: blur(8px);
      padding: 0.8rem 1rem;
      border-radius: 24px;
      border: 1px solid #d4af3730;
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem 0.8rem;
      box-shadow: inset 0 0 20px #00000080;
      position: relative;
      z-index: 5;
    }
    .admin-panel.open {
      display: grid;
    }
    .admin-panel label {
      font-size: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #b09ec8;
      font-weight: 600;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .admin-panel label input {
      background: #0b0813;
      border: 1px solid #d4af3740;
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
      color: #f5e7d0;
      font-family: 'Orbitron', monospace;
      font-size: 0.55rem;
      outline: none;
      transition: 0.2s;
    }
    .admin-panel label input:focus {
      border-color: #d4af37;
      box-shadow: 0 0 15px #d4af3715;
    }
    .admin-panel .apply-btn {
      grid-column: 1 / -1;
      background: #d4af3730;
      border: 1px solid #d4af37;
      color: #ecd8a5;
      font-weight: 700;
      padding: 0.3rem;
      border-radius: 40px;
      font-size: 0.6rem;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.1rem;
      backdrop-filter: blur(4px);
    }
    .admin-panel .apply-btn:hover {
      background: #d4af3760;
      box-shadow: 0 0 25px #d4af3720;
    }

    @media (max-width: 480px) {
      .panel { padding: 0.8rem; }
      .code-block .big-code { font-size: 0.95rem; letter-spacing: 1px; }
      .code-block .label-kalyan { font-size: 0.95rem; }
      .market-item { font-size: 0.6rem; }
      .grid-row-2 .num-sm { font-size: 0.6rem; }
      .grid-row-3 .num-lg { font-size: 0.9rem; }
      .top-royal .royal-title { font-size: 0.7rem; }
      .top-royal .fees-badge { font-size: 0.7rem; }
    }
  </style>
</head>
<body>
<div class="panel" id="mainPanel">

  <div class="top-royal">
    <span class="royal-title" id="royalTitle">✦ Royal</span>
    <span class="weekly-badge" id="weeklyDisplay">WEEKLY</span>
    <span class="fees-badge" id="feesDisplay">3000/-</span>
  </div>

  <div class="code-block">
    <span class="big-code" id="codeDisplay">93014 01044</span>
    <span class="label-kalyan" id="kalyanDisplay">KALYAN</span>
  </div>

  <div class="hint-text" id="hintDisplay">(एस आपन दूर क्लोज - जोडी की पट्टी अवश्य करें )</div>

  <div class="markets-grid" id="marketsGrid">
    <div class="market-item" id="m1">MUMBAI <span>मुंबई</span></div>
    <div class="market-item" id="m2">DELHI <span>दिल्ली</span></div>
    <div class="market-item" id="m3">KOLKATA <span>कोलकाता</span></div>
    <div class="market-item" id="m4">CHENNAI <span>चेन्नई</span></div>
    <div class="market-item" id="m5">BANGALORE <span>बेंगलुरु</span></div>
    <div class="market-item" id="m6">HYDERABAD <span>हैदराबाद</span></div>
  </div>

  <div class="grid-row-2" id="row2Grid">
    <div class="num-sm" id="r2c1">355</div>
    <div class="num-sm" id="r2c2">580</div>
    <div class="num-sm" id="r2c3">350</div>
    <div class="num-sm" id="r2c4">558</div>
    <div class="num-sm" id="r2c5">227</div>
    <div class="num-sm" id="r2c6">560</div>
  </div>

  <div class="grid-row-3" id="row3Grid">
    <div class="num-lg" id="r3c1">3833</div>
    <div class="num-lg" id="r3c2">8388</div>
    <div class="num-lg" id="r3c3">1116</div>
  </div>

  <div class="footer-line">
    <span class="raj">पो. <span>राज सर</span> - <span id="footerPhone">9301401044</span></span>
    <span class="web" id="footerWeb">WWW.KALYANSUBHANK.COM</span>
  </div>

  <div class="admin-toggle">
    <button id="adminToggleBtn">⚜️ ADMIN</button>
  </div>

  <div class="admin-panel" id="adminPanel">
    <label>ROYAL TITLE <input type="text" id="adminTitle" value="✦ Royal"></label>
    <label>WEEKLY <input type="text" id="adminWeekly" value="WEEKLY"></label>
    <label>FEES <input type="text" id="adminFees" value="3000/-"></label>
    <label>CODE <input type="text" id="adminCode" value="93014 01044"></label>
    <label>KALYAN <input type="text" id="adminKalyan" value="KALYAN"></label>
    <label>HINT <input type="text" id="adminHint" value="(एस आपन दूर क्लोज - जोडी की पट्टी अवश्य करें )"></label>
    <label>MARKET 1 <input type="text" id="adminM1" value="MUMBAI"></label>
    <label>MARKET 2 <input type="text" id="adminM2" value="DELHI"></label>
    <label>MARKET 3 <input type="text" id="adminM3" value="KOLKATA"></label>
    <label>MARKET 4 <input type="text" id="adminM4" value="CHENNAI"></label>
    <label>MARKET 5 <input type="text" id="adminM5" value="BANGALORE"></label>
    <label>MARKET 6 <input type="text" id="adminM6" value="HYDERABAD"></label>
    <label>R2 (6 nums) <input type="text" id="adminR2" value="355,580,350,558,227,560"></label>
    <label>R3 (3 nums) <input type="text" id="adminR3" value="3833,8388,1116"></label>
    <label>FOOTER PHONE <input type="text" id="adminPhone" value="9301401044"></label>
    <label>WEBSITE <input type="text" id="adminWeb" value="WWW.KALYANSUBHANK.COM"></label>
    <button class="apply-btn" id="applyAdminBtn">⟳ APPLY</button>
  </div>
</div>

<script>
  (function() {
    const panel = document.getElementById('adminPanel');
    const toggleBtn = document.getElementById('adminToggleBtn');

    toggleBtn.addEventListener('click', function() {
      panel.classList.toggle('open');
      toggleBtn.textContent = panel.classList.contains('open') ? '✕ CLOSE' : '⚜️ ADMIN';
      if (panel.classList.contains('open')) syncAdminFromDisplay();
    });

    const titleDisplay = document.getElementById('royalTitle');
    const weeklyDisplay = document.getElementById('weeklyDisplay');
    const feesDisplay = document.getElementById('feesDisplay');
    const codeDisplay = document.getElementById('codeDisplay');
    const kalyanDisplay = document.getElementById('kalyanDisplay');
    const hintDisplay = document.getElementById('hintDisplay');
    const m1 = document.getElementById('m1'), m2 = document.getElementById('m2'), m3 = document.getElementById('m3');
    const m4 = document.getElementById('m4'), m5 = document.getElementById('m5'), m6 = document.getElementById('m6');
    const r2c1 = document.getElementById('r2c1'), r2c2 = document.getElementById('r2c2'), r2c3 = document.getElementById('r2c3');
    const r2c4 = document.getElementById('r2c4'), r2c5 = document.getElementById('r2c5'), r2c6 = document.getElementById('r2c6');
    const r3c1 = document.getElementById('r3c1'), r3c2 = document.getElementById('r3c2'), r3c3 = document.getElementById('r3c3');
    const footerPhone = document.getElementById('footerPhone'), footerWeb = document.getElementById('footerWeb');

    const adminTitle = document.getElementById('adminTitle');
    const adminWeekly = document.getElementById('adminWeekly');
    const adminFees = document.getElementById('adminFees');
    const adminCode = document.getElementById('adminCode');
    const adminKalyan = document.getElementById('adminKalyan');
    const adminHint = document.getElementById('adminHint');
    const adminM1 = document.getElementById('adminM1'), adminM2 = document.getElementById('adminM2'), adminM3 = document.getElementById('adminM3');
    const adminM4 = document.getElementById('adminM4'), adminM5 = document.getElementById('adminM5'), adminM6 = document.getElementById('adminM6');
    const adminR2 = document.getElementById('adminR2'), adminR3 = document.getElementById('adminR3');
    const adminPhone = document.getElementById('adminPhone'), adminWeb = document.getElementById('adminWeb');

    function applyChanges() {
      titleDisplay.textContent = adminTitle.value || '✦ Royal';
      weeklyDisplay.textContent = adminWeekly.value || 'WEEKLY';
      feesDisplay.textContent = adminFees.value || '3000/-';
      codeDisplay.textContent = adminCode.value || '93014 01044';
      kalyanDisplay.textContent = adminKalyan.value || 'KALYAN';
      hintDisplay.textContent = adminHint.value || '(एस आपन दूर क्लोज - जोडी की पट्टी अवश्य करें )';

      const setMarket = (el, val) => {
        const span = el.querySelector('span');
        el.innerHTML = `${val || 'MARKET'} `;
        if (span) el.appendChild(span);
        else el.innerHTML += '<span> </span>';
      };
      setMarket(m1, adminM1.value);
      setMarket(m2, adminM2.value);
      setMarket(m3, adminM3.value);
      setMarket(m4, adminM4.value);
      setMarket(m5, adminM5.value);
      setMarket(m6, adminM6.value);

      const r2vals = adminR2.value.split(',').map(s => s.trim());
      if (r2vals.length >= 6) {
        r2c1.textContent = r2vals[0]; r2c2.textContent = r2vals[1]; r2c3.textContent = r2vals[2];
        r2c4.textContent = r2vals[3]; r2c5.textContent = r2vals[4]; r2c6.textContent = r2vals[5];
      }
      const r3vals = adminR3.value.split(',').map(s => s.trim());
      if (r3vals.length >= 3) {
        r3c1.textContent = r3vals[0]; r3c2.textContent = r3vals[1]; r3c3.textContent = r3vals[2];
      }
      footerPhone.textContent = adminPhone.value || '9301401044';
      footerWeb.textContent = adminWeb.value || 'WWW.KALYANSUBHANK.COM';
    }

    function syncAdminFromDisplay() {
      adminTitle.value = titleDisplay.textContent;
      adminWeekly.value = weeklyDisplay.textContent;
      adminFees.value = feesDisplay.textContent;
      adminCode.value = codeDisplay.textContent;
      adminKalyan.value = kalyanDisplay.textContent;
      adminHint.value = hintDisplay.textContent;
      adminM1.value = m1.textContent.replace('मुंबई','').trim();
      adminM2.value = m2.textContent.replace('दिल्ली','').trim();
      adminM3.value = m3.textContent.replace('कोलकाता','').trim();
      adminM4.value = m4.textContent.replace('चेन्नई','').trim();
      adminM5.value = m5.textContent.replace('बेंगलुरु','').trim();
      adminM6.value = m6.textContent.replace('हैदराबाद','').trim();
      adminR2.value = `${r2c1.textContent},${r2c2.textContent},${r2c3.textContent},${r2c4.textContent},${r2c5.textContent},${r2c6.textContent}`;
      adminR3.value = `${r3c1.textContent},${r3c2.textContent},${r3c3.textContent}`;
      adminPhone.value = footerPhone.textContent;
      adminWeb.value = footerWeb.textContent;
    }

    document.getElementById('applyAdminBtn').addEventListener('click', applyChanges);
    window.addEventListener('load', syncAdminFromDisplay);
    panel.classList.remove('open');
    toggleBtn.textContent = '⚜️ ADMIN';
  })();
</script>
</body>
</html>
