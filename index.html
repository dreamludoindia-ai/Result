<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SRIDEVI · MILAN DAY</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0e14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            padding: 1rem;
            background-image: radial-gradient(circle at 50% 0%, #1a1f2e 0%, #080b10 100%);
        }

        .container {
            max-width: 720px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* ========== CARD ========== */
        .card {
            background: #111827;
            border-radius: 1.5rem;
            padding: 1.5rem 1.8rem 1.8rem;
            border: 1px solid #2a3346;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #f59e0b, #fbbf24, #f59e0b);
            opacity: 0.6;
        }

        /* ========== HEADER ========== */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid #1e293b;
        }

        .card-header .title {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.15);
        }

        .card-header .datetime {
            font-size: 0.7rem;
            font-weight: 500;
            color: #94a3b8;
            letter-spacing: 0.3px;
            background: #1e293b;
            padding: 0.2rem 0.9rem;
            border-radius: 20px;
            border: 1px solid #2a3346;
        }

        .card-header .live-badge {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #22c55e;
            background: #052e16;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            border: 1px solid #22c55e40;
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ========== OTC ROW ========== */
        .otc-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.7rem;
            padding: 0.4rem 0.8rem;
            background: #0f172a;
            border-radius: 12px;
            border: 1px solid #1e293b;
        }

        .otc-row .label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #94a3b8;
            letter-spacing: 1px;
            min-width: 32px;
        }

        .otc-row .numbers {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .otc-row .numbers .num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: #e2e8f0;
            background: #0b0f1a;
            padding: 0.1rem 0.6rem;
            border-radius: 6px;
            border: 1px solid #2a3346;
            min-width: 28px;
            text-align: center;
        }

        .otc-row .arrow {
            color: #fbbf24;
            font-weight: 700;
            font-size: 1rem;
        }

        /* ========== JODI ROW ========== */
        .jodi-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.7rem;
            padding: 0.4rem 0.8rem;
            background: #0f172a;
            border-radius: 12px;
            border: 1px solid #1e293b;
        }

        .jodi-row .label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #94a3b8;
            letter-spacing: 1px;
            min-width: 32px;
        }

        .jodi-row .numbers {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .jodi-row .numbers .num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            font-weight: 600;
            color: #e2e8f0;
            background: #0b0f1a;
            padding: 0.1rem 0.6rem;
            border-radius: 6px;
            border: 1px solid #2a3346;
            min-width: 32px;
            text-align: center;
        }

        .jodi-row .arrow {
            color: #fbbf24;
            font-weight: 700;
            font-size: 1rem;
        }

        /* ========== PANEL ROW ========== */
        .panel-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 0.8rem;
            background: #0f172a;
            border-radius: 12px;
            border: 1px solid #1e293b;
            margin-top: 0.2rem;
        }

        .panel-row .label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #94a3b8;
            letter-spacing: 1px;
            min-width: 42px;
        }

        .panel-row .numbers {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .panel-row .numbers .num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            font-weight: 600;
            color: #fbbf24;
            background: #0b0f1a;
            padding: 0.1rem 0.6rem;
            border-radius: 6px;
            border: 1px solid #fbbf2430;
            min-width: 36px;
            text-align: center;
        }

        /* ========== ADMIN ========== */
        .admin-toggle {
            text-align: right;
            margin-top: 0.2rem;
        }

        .admin-toggle button {
            background: #1e293b;
            border: 1px solid #2a3346;
            color: #94a3b8;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.65rem;
            padding: 0.3rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }

        .admin-toggle button:hover {
            background: #2a3346;
            color: #e2e8f0;
            border-color: #fbbf2440;
        }

        .admin-panel {
            margin-top: 1rem;
            background: #0f172a;
            backdrop-filter: blur(8px);
            padding: 1.2rem 1.5rem;
            border-radius: 1rem;
            border: 1px solid #1e293b;
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem 1rem;
            box-shadow: inset 0 0 30px #00000060;
        }

        .admin-panel.open {
            display: grid;
        }

        .admin-panel label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .admin-panel label input {
            background: #0b0f1a;
            border: 1px solid #1e293b;
            padding: 0.25rem 0.6rem;
            border-radius: 8px;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            outline: none;
            transition: 0.2s;
        }

        .admin-panel label input:focus {
            border-color: #fbbf24;
            box-shadow: 0 0 15px #fbbf2410;
        }

        .admin-panel .apply-btn {
            grid-column: 1 / -1;
            background: #fbbf2420;
            border: 1px solid #fbbf24;
            color: #fbbf24;
            font-weight: 700;
            padding: 0.5rem;
            border-radius: 12px;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.2rem;
        }

        .admin-panel .apply-btn:hover {
            background: #fbbf2440;
            box-shadow: 0 0 30px #fbbf2410;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 550px) {
            .card {
                padding: 1rem 1.2rem 1.4rem;
            }
            .card-header .title {
                font-size: 1rem;
            }
            .card-header .datetime {
                font-size: 0.55rem;
                padding: 0.15rem 0.6rem;
            }
            .otc-row .numbers .num {
                font-size: 0.85rem;
                min-width: 22px;
                padding: 0.05rem 0.4rem;
            }
            .jodi-row .numbers .num {
                font-size: 0.75rem;
                min-width: 26px;
                padding: 0.05rem 0.4rem;
            }
            .panel-row .numbers .num {
                font-size: 0.75rem;
                min-width: 30px;
                padding: 0.05rem 0.4rem;
            }
            .admin-panel {
                grid-template-columns: 1fr;
                padding: 0.8rem 1rem;
            }
        }

        @media (max-width: 400px) {
            .card-header {
                flex-wrap: wrap;
                gap: 0.3rem;
            }
            .otc-row,
            .jodi-row,
            .panel-row {
                flex-wrap: wrap;
                padding: 0.3rem 0.6rem;
            }
            .otc-row .label,
            .jodi-row .label,
            .panel-row .label {
                min-width: 100%;
                font-size: 0.55rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== CARD 1: SRIDEVI ===== -->
        <div class="card" id="card1">
            <div class="card-header">
                <span class="title" id="title1">SRIDEVI</span>
                <span class="datetime" id="datetime1">16/06/2026 10:35 AM</span>
                <span class="live-badge">● LIVE</span>
            </div>

            <!-- OTC -->
            <div class="otc-row">
                <span class="label">OTC</span>
                <span class="arrow">→</span>
                <div class="numbers" id="otc1">
                    <span class="num">9</span>
                    <span class="num">0</span>
                    <span class="num">5</span>
                    <span class="num">4</span>
                </div>
            </div>

            <!-- Jodi -->
            <div class="jodi-row">
                <span class="label">Jodi</span>
                <span class="arrow">→</span>
                <div class="numbers" id="jodi1">
                    <span class="num">91</span>
                    <span class="num">92</span>
                    <span class="num">07</span>
                    <span class="num">06</span>
                    <span class="num">51</span>
                    <span class="num">57</span>
                    <span class="num">42</span>
                    <span class="num">46</span>
                </div>
            </div>

            <!-- Panel -->
            <div class="panel-row">
                <span class="label">Panel</span>
                <span class="arrow">→</span>
                <div class="numbers" id="panel1">
                    <span class="num">889</span>
                    <span class="num">127</span>
                    <span class="num">469</span>
                    <span class="num">568</span>
                    <span class="num">370</span>
                    <span class="num">690</span>
                    <span class="num">149</span>
                    <span class="num">257</span>
                    <span class="num">239</span>
                </div>
            </div>
        </div>

        <!-- ===== CARD 2: MILAN DAY ===== -->
        <div class="card" id="card2">
            <div class="card-header">
                <span class="title" id="title2">MILAN DAY</span>
                <span class="datetime" id="datetime2">11/6/2026 1:35 PM</span>
                <span class="live-badge">● LIVE</span>
            </div>

            <!-- OTC -->
            <div class="otc-row">
                <span class="label">OTC</span>
                <span class="arrow">→</span>
                <div class="numbers" id="otc2">
                    <span class="num">3</span>
                    <span class="num">8</span>
                    <span class="num">9</span>
                    <span class="num">1</span>
                </div>
            </div>

            <!-- Jodi -->
            <div class="jodi-row">
                <span class="label">Jodi</span>
                <span class="arrow">→</span>
                <div class="numbers" id="jodi2">
                    <span class="num">30</span>
                    <span class="num">34</span>
                    <span class="num">96</span>
                    <span class="num">95</span>
                    <span class="num">87</span>
                    <span class="num">86</span>
                    <span class="num">14</span>
                    <span class="num">17</span>
                </div>
            </div>

            <!-- Panel -->
            <div class="panel-row">
                <span class="label">Panel</span>
                <span class="arrow">→</span>
                <div class="numbers" id="panel2">
                    <span class="num">247</span>
                    <span class="num">490</span>
                    <span class="num">125</span>
                    <span class="num">279</span>
                    <span class="num">234</span>
                    <span class="num">379</span>
                    <span class="num">245</span>
                    <span class="num">489</span>
                </div>
            </div>
        </div>

        <!-- ===== ADMIN ===== -->
        <div class="admin-toggle">
            <button id="adminToggleBtn">⚙️ ADMIN</button>
        </div>

        <div class="admin-panel" id="adminPanel">
            <label>Title 1 <input type="text" id="aTitle1" value="SRIDEVI"></label>
            <label>Date/Time 1 <input type="text" id="aDatetime1" value="16/06/2026 10:35 AM"></label>
            <label>OTC 1 (space separated) <input type="text" id="aOtc1" value="9 0 5 4"></label>
            <label>Jodi 1 (space separated) <input type="text" id="aJodi1" value="91 92 07 06 51 57 42 46"></label>
            <label>Panel 1 (space separated) <input type="text" id="aPanel1" value="889 127 469 568 370 690 149 257 239"></label>

            <label>Title 2 <input type="text" id="aTitle2" value="MILAN DAY"></label>
            <label>Date/Time 2 <input type="text" id="aDatetime2" value="11/6/2026 1:35 PM"></label>
            <label>OTC 2 (space separated) <input type="text" id="aOtc2" value="3 8 9 1"></label>
            <label>Jodi 2 (space separated) <input type="text" id="aJodi2" value="30 34 96 95 87 86 14 17"></label>
            <label>Panel 2 (space separated) <input type="text" id="aPanel2" value="247 490 125 279 234 379 245 489"></label>

            <button class="apply-btn" id="applyBtn">⟳ APPLY CHANGES</button>
        </div>
    </div>

    <script>
        (function() {
            const adminPanel = document.getElementById('adminPanel');
            const toggleBtn = document.getElementById('adminToggleBtn');

            toggleBtn.addEventListener('click', function() {
                adminPanel.classList.toggle('open');
                toggleBtn.textContent = adminPanel.classList.contains('open') ? '✕ CLOSE' : '⚙️ ADMIN';
                if (adminPanel.classList.contains('open')) syncAdmin();
            });

            // Helper to update a numbers container
            function updateNumbers(containerId, values) {
                const container = document.getElementById(containerId);
                if (!container) return;
                container.innerHTML = values.map(v => `<span class="num">${v.trim()}</span>`).join('');
            }

            function applyChanges() {
                // Card 1
                document.getElementById('title1').textContent = document.getElementById('aTitle1').value || 'SRIDEVI';
                document.getElementById('datetime1').textContent = document.getElementById('aDatetime1').value || '16/06/2026 10:35 AM';

                const otc1 = document.getElementById('aOtc1').value.split(/\s+/).filter(s => s);
                updateNumbers('otc1', otc1.length ? otc1 : ['9', '0', '5', '4']);

                const jodi1 = document.getElementById('aJodi1').value.split(/\s+/).filter(s => s);
                updateNumbers('jodi1', jodi1.length ? jodi1 : ['91', '92', '07', '06', '51', '57', '42', '46']);

                const panel1 = document.getElementById('aPanel1').value.split(/\s+/).filter(s => s);
                updateNumbers('panel1', panel1.length ? panel1 : ['889', '127', '469', '568', '370', '690', '149', '257', '239']);

                // Card 2
                document.getElementById('title2').textContent = document.getElementById('aTitle2').value || 'MILAN DAY';
                document.getElementById('datetime2').textContent = document.getElementById('aDatetime2').value || '11/6/2026 1:35 PM';

                const otc2 = document.getElementById('aOtc2').value.split(/\s+/).filter(s => s);
                updateNumbers('otc2', otc2.length ? otc2 : ['3', '8', '9', '1']);

                const jodi2 = document.getElementById('aJodi2').value.split(/\s+/).filter(s => s);
                updateNumbers('jodi2', jodi2.length ? jodi2 : ['30', '34', '96', '95', '87', '86', '14', '17']);

                const panel2 = document.getElementById('aPanel2').value.split(/\s+/).filter(s => s);
                updateNumbers('panel2', panel2.length ? panel2 : ['247', '490', '125', '279', '234', '379', '245', '489']);
            }

            function syncAdmin() {
                document.getElementById('aTitle1').value = document.getElementById('title1').textContent;
                document.getElementById('aDatetime1').value = document.getElementById('datetime1').textContent;

                const getNumbers = (id) => {
                    const els = document.getElementById(id).querySelectorAll('.num');
                    return Array.from(els).map(el => el.textContent).join(' ');
                };
                document.getElementById('aOtc1').value = getNumbers('otc1');
                document.getElementById('aJodi1').value = getNumbers('jodi1');
                document.getElementById('aPanel1').value = getNumbers('panel1');

                document.getElementById('aTitle2').value = document.getElementById('title2').textContent;
                document.getElementById('aDatetime2').value = document.getElementById('datetime2').textContent;
                document.getElementById('aOtc2').value = getNumbers('otc2');
                document.getElementById('aJodi2').value = getNumbers('jodi2');
                document.getElementById('aPanel2').value = getNumbers('panel2');
            }

            document.getElementById('applyBtn').addEventListener('click', applyChanges);
            window.addEventListener('load', function() {
                adminPanel.classList.remove('open');
                toggleBtn.textContent = '⚙️ ADMIN';
            });
        })();
    </script>
</body>
</html>
