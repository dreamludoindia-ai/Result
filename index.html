<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RONAK_LIVE_SHOW</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e3a5f);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 30px;
            background: #1e293b;
            border-radius: 20px;
            margin-bottom: 30px;
            border-bottom: 3px solid #22c55e;
        }
        .header h1 { color: white; font-size: 1.5rem; }
        .header h1 span { color: #22c55e; }
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .market-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #22c55e;
            transition: 0.3s;
        }
        .market-card:hover { transform: translateY(-5px); background: #2d3a4e; }
        .market-name { color: white; font-size: 1rem; font-weight: bold; }
        .market-price { color: #22c55e; margin: 10px 0; font-size: 0.8rem; }
        .market-price span { font-size: 1.2rem; font-weight: bold; }
        .btn { background: #22c55e; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; width: 100%; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 1px solid #22c55e;
        }
        .close { float: right; font-size: 28px; cursor: pointer; color: white; }
        .qr-box {
            background: white;
            padding: 10px;
            border-radius: 15px;
            margin: 15px 0;
        }
        .qr-box img { width: 100%; max-width: 200px; }
        .timer { font-size: 2rem; color: #f59e0b; margin: 10px 0; }
        .whatsapp-btn { background: #25D366; color: white; border: none; padding: 12px; border-radius: 40px; width: 100%; margin-top: 15px; cursor: pointer; font-size: 1rem; }
        .footer { text-align: center; color: #64748b; margin-top: 30px; font-size: 0.7rem; }
        .check-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #1e293b;
            color: #22c55e;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #22c55e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎲 RONAK<span>_LIVE_SHOW</span></h1>
        </div>

        <div class="market-grid" id="marketGrid"></div>

        <div class="footer">
            <p>© 2024 RONAK_LIVE_SHOW | Support: WhatsApp Only</p>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 style="color: white;">💰 Pay ₹999</h2>
            <div id="selectedMarket" style="color: #22c55e; margin: 10px 0;"></div>
            <div class="timer" id="timer">10:00</div>
            <div class="qr-box">
                <img id="qrImage" src="https://i.imgur.com/W4JYgb3.jpeg" alt="QR Code">
            </div>
            <button class="whatsapp-btn" onclick="sendPayment()">📤 Send Screenshot on WhatsApp</button>
            <div style="color: #94a3b8; font-size: 0.7rem; margin-top: 15px;">Scan QR → Pay ₹999 → Send Screenshot</div>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="resultModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeResultModal()">&times;</span>
            <h2 style="color: white;">🎯 Result</h2>
            <img id="resultImg" src="" style="max-width: 100%; border-radius: 10px; margin: 15px 0;">
            <div id="resultText" style="color: #22c55e;"></div>
            <button class="btn" onclick="closeResultModal()">Close</button>
        </div>
    </div>

    <div class="check-btn" onclick="checkResult()">🔍</div>

    <script>
        const markets = ["SRIDEVI", "MILAN DAY", "KALYAN", "SRIDEVI NIGHT", "MILAN NIGHT", "MAIN BAZAR"];
        let currentMarket = "";
        let currentId = "";
        let timerInterval = null;

        function loadMarkets() {
            const grid = document.getElementById('marketGrid');
            grid.innerHTML = "";
            markets.forEach(m => {
                grid.innerHTML += `
                    <div class="market-card" onclick="openModal('${m}')">
                        <div class="market-name">${m}</div>
                        <div class="market-price">💰 ₹<span>999</span></div>
                        <button class="btn">Select</button>
                    </div>
                `;
            });
        }

        function openModal(market) {
            currentMarket = market;
            currentId = "TXN_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
            document.getElementById('selectedMarket').innerHTML = market;
            document.getElementById('paymentModal').style.display = 'flex';
            startTimer(600);
        }

        function startTimer(seconds) {
            if (timerInterval) clearInterval(timerInterval);
            let timeLeft = seconds;
            const timerEl = document.getElementById('timer');
            timerInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                timerEl.innerHTML = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerEl.innerHTML = "Expired!";
                }
            }, 1000);
        }

        function sendPayment() {
            // Get existing payments
            let payments = JSON.parse(localStorage.getItem('payments_list') || '[]');
            payments.push({
                id: currentId,
                market: currentMarket,
                time: new Date().toLocaleString(),
                status: 'pending'
            });
            localStorage.setItem('payments_list', JSON.stringify(payments));

            // Send WhatsApp message
            const msg = `NEW PAYMENT REQUEST%0A%0AMarket: ${currentMarket}%0AAmount: ₹999%0AID: ${currentId}%0A%0ASend screenshot here:`;
            window.open(`https://wa.me/919113224019?text=${msg}`, '_blank');

            alert(`✅ Request sent! ID: ${currentId}`);
            closeModal();
            if (timerInterval) clearInterval(timerInterval);
        }

        function closeModal() {
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('paymentModal').style.display = 'none';
        }

        function closeResultModal() {
            document.getElementById('resultModal').style.display = 'none';
        }

        function checkResult() {
            const market = prompt("Enter market name (SRIDEVI, MILAN DAY, KALYAN, SRIDEVI NIGHT, MILAN NIGHT, MAIN BAZAR):");
            if (!market) return;
            
            const results = JSON.parse(localStorage.getItem('results_list') || '{}');
            const result = results[market.toUpperCase()];
            
            if (result && result.imageUrl) {
                document.getElementById('resultImg').src = result.imageUrl;
                document.getElementById('resultText').innerHTML = result.note || "Result";
                document.getElementById('resultModal').style.display = 'flex';
            } else {
                alert("Result not uploaded yet!");
            }
        }

        loadMarkets();
    </script>
</body>
</html>
